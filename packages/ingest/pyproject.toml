[project]
name = "databolsa-ingest"
version = "0.1.0"
description = "DataBolsa — extratores de dados brutos do mercado financeiro brasileiro (PoC)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
    "polars>=1.8",
    "httpx>=0.27",
    "tenacity>=8.2",
    "typer>=0.12",
    "pyyaml>=6.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "respx>=0.21",
]

[project.scripts]
databolsa-ingest = "databolsa_ingest.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/databolsa_ingest"]

[tool.pytest.ini_options]
testpaths = ["tests"]
