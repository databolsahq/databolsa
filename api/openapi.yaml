                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listOfferings
      tags:
        - Primary Market
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: search
          schema:
            type: string
            description: Nome ou CNPJ do emissor.
        - in: query
          name: regime
          schema:
            type: string
            enum:
              - ICVM_400_476
              - RCVM_160
        - in: query
          name: tipo_ativo
          schema:
            type: string
            description: "Ex.: 'Ações', 'Debêntures'."
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
