              séries macro. Ótimo p/ resolver ticker↔nome.
          required: true
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          required: false
      summary: Busca unificada (typeahead) por ações/FIIs/índices/títulos/macro
  /v1/ingest:
    get:
      responses:
        "200":
          description: Saúde da ingestão
          content:
            application/json:
              schema:
                type: object
                properties:
                  latest:
                    oneOf:
                      - allOf:
                          - $ref: "#/components/schemas/IngestRunSummary"
                        properties:
                          errors:
                            type: array
                            items:
                              type: string
                        required:
                          - errors
                      - type: "null"
                  sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestSourceHealth"
                  recent_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestRunSummary"
                required:
                  - latest
                  - sources
                  - recent_runs
        default: *a1
      operationId: getIngestHealth
      tags:
        - System
      parameters: []
      summary: Saúde da ingestão (última run, fontes, histórico)
  /v1/portfolio:
    get:
      operationId: getPortfolio
      tags:
        - Carteira
      summary: Sua carteira (consolidada)
      description: "Retorna a carteira consolidada do dono da chave de API:
        patrimônio, total investido, P&L realizado e não-realizado, variação do
        dia, composição por classe, maiores posições e quebra por carteira.
        Exige uma chave de API por usuário (crie em
        https://databolsa.com/conta)."
      responses:
        "200":
          description: Carteira consolidada do usuário.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioContext"
        default: &a3
          description: Erro (RFC 9457 application/problem+json)
          content:
            application/problem+json:
              schema:
                type: object
  /v1/suitability:
    get:
      operationId: getSuitability
      tags:
        - Carteira
      summary: Seu perfil de investidor
      description: "Retorna o perfil de investidor (suitability) do dono da chave:
        nível (Conservador/Moderado/Arrojado), a posição na régua 0–100 (não é
        uma nota) e as respostas do questionário. `profile` é nulo se o usuário
        ainda não definiu o perfil."
      responses:
        "200":
          description: Perfil de investidor do usuário (ou nulo).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuitabilityEnvelope"
        default: *a3
  /v1/documents/search:
    get:
      operationId: searchDocuments
      tags:
        - Documentos
      summary: Busca semântica em documentos
      description: Busca semântica no TEXTO de documentos CVM/B3 (fatos relevantes,
        releases de resultado, balanços, relatórios gerenciais de FII, atas de
        assembleia). Ideal para perguntas qualitativas que os dados estruturados
        não respondem. Filtre por papel, categoria e ano quando souber.
      parameters:
        - name: q
          in: query
          required: true
          description: Termo/pergunta em linguagem natural.
          schema:
            type: string
        - name: tickers
          in: query
          required: false
          description: "Filtra por papéis (CSV), ex.: PETR4,PRIO3."
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: "Categoria do documento, ex.: Fato Relevante."
          schema:
            type: string
        - name: year
          in: query
          required: false
          description: Ano de referência do documento (AAAA).
          schema:
            type: integer
        - name: tables_only
          in: query
          required: false
          description: Restringe a trechos de tabela (fatos numéricos).
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          description: Máximo de trechos (1–25, default 8).
          schema:
            type: integer
      responses:
        "200":
          description: Trechos relevantes + bloco de contexto com citação.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSearchResponse"
        default: *a3
