        - expiries
    OptionQuote:
      type: object
      properties:
        date:
          type: string
        option_ticker:
          type: string
        option_type:
          type:
            - string
            - "null"
        strike:
          type:
            - number
            - "null"
        expiry:
          type:
            - string
            - "null"
        open:
          type:
            - number
            - "null"
        high:
          type:
            - number
            - "null"
        low:
          type:
            - number
            - "null"
        last:
          type:
            - number
            - "null"
        volume_brl:
          type:
            - number
            - "null"
        trades:
          type:
            - number
            - "null"
        underlying_spot:
          type:
            - number
            - "null"
        moneyness:
          type:
            - number
            - "null"
        intrinsic:
          type:
            - number
            - "null"
        time_value:
          type:
            - number
            - "null"
        iv:
          type:
            - number
            - "null"
        delta:
          type:
            - number
            - "null"
        gamma:
          type:
            - number
            - "null"
        vega:
          type:
            - number
            - "null"
        theta:
          type:
            - number
            - "null"
      required:
        - date
        - option_ticker
        - option_type
        - strike
        - expiry
        - open
        - high
        - low
        - last
        - volume_brl
        - trades
        - underlying_spot
        - moneyness
        - intrinsic
        - time_value
        - iv
        - delta
        - gamma
        - vega
        - theta
    CryptoCandle:
      type: object
      properties:
        open_time:
          type: string
        close_time:
          type: string
        open:
          type:
            - number
            - "null"
        high:
          type:
            - number
            - "null"
        low:
          type:
            - number
            - "null"
        close:
          type:
            - number
            - "null"
        volume:
          type:
            - number
            - "null"
          description: Volume na moeda base
        quote_volume:
          type:
            - number
            - "null"
          description: Volume em BRL
        trades:
          type:
            - number
            - "null"
      required:
        - open_time
        - close_time
        - open
        - high
        - low
        - close
        - volume
        - quote_volume
        - trades
    SearchResult:
      type: object
      properties:
        kind:
          type: string
          enum:
            - stock
            - fii
            - index
            - bond
            - macro
        ticker:
          type: string
        title:
          type: string
        subtitle:
          type:
            - string
            - "null"
        href:
          type: string
        score:
          type: number
      required:
        - kind
        - ticker
        - title
        - subtitle
        - href
        - score
    IngestRunSummary:
      type: object
      properties:
        run_id:
          type: string
        trigger:
          type: string
        started_at:
          type: string
        finished_at:
          type: string
        duration_s:
          type: number
        exit:
          type: number
        ok:
          type: boolean
        error_count:
          type: number
      required:
        - run_id
        - trigger
        - started_at
        - finished_at
        - duration_s
        - exit
        - ok
        - error_count
    IngestSourceHealth:
      type: object
      properties:
        source:
          type: string
        status:
          type: string
          enum:
            - ok
            - stale
            - error
            - no_data
        last_fetch:
          type:
            - string
            - "null"
        age_days:
          type:
            - number
            - "null"
        datasets:
          type: number
        missing:
          type: number
        failed_validation:
          type: number
        ok:
          type: number
        skip:
          type: number
        miss:
          type: number
        err:
          type: number
        rows:
          type: number
        duration_s:
          type:
            - number
            - "null"
      required:
        - source
        - status
        - last_fetch
        - age_days
        - datasets
        - missing
        - failed_validation
        - ok
        - skip
        - miss
        - err
        - rows
        - duration_s
tags:
  - name: Companies
    description: Companhias abertas (cadastro CVM) e demonstrações
  - name: Stocks
    description: Ações — cotações, indicadores, proventos e eventos
  - name: FIIs
    description: Fundos imobiliários — indicadores e distribuições
  - name: Bonds
    description: Títulos públicos (Tesouro Direto) e curvas de juros
  - name: Crypto
    description: Criptoativos em BRL
  - name: Indices
    description: Índices da B3 (IBOV, IFIX, ...) e composições
  - name: BDR
    description: BDRs (recibos de ações estrangeiras) — catálogo e cotações
  - name: Options
    description: Opções sobre ações — cadeia vigente e histórico EOD
  - name: Macro
    description: Séries macroeconômicas, expectativas Focus e regime
  - name: Screener
    description: Filtros multi-critério sobre ações e FIIs
  - name: System
    description: Saúde e metadados da API
paths:
  /v1/health:
    get:
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default: &a1
          description: Erro (RFC 9457 application/problem+json)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
      operationId: getHealth
      tags:
        - System
      parameters: []
      summary: Status da API e frescor dos dados
      security: []
  /v1/companies:
    get:
      responses:
        "200":
          description: Página de companhias
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Company"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listCompanies
      tags:
        - Companies
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: sector
          schema:
            type: string
        - in: query
          name: segment
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      summary: Lista companhias abertas (cadastro CVM)
  /v1/companies/{cvm_code}:
    get:
      responses:
        "200":
          description: Companhia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        default: *a1
      operationId: getCompany
      tags:
        - Companies
      parameters:
        - in: path
          name: cvm_code
          schema:
            type: integer
            exclusiveMinimum: 0
          required: true
      summary: Companhia por código CVM
  /v1/companies/{cvm_code}/documents:
    get:
      responses:
        "200":
          description: Página de documentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listCompanyDocuments
      tags:
        - Companies
      parameters:
        - in: path
          name: cvm_code
          schema:
            type: integer
            exclusiveMinimum: 0
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Documentos e comunicados (IPE/CVM)
  /v1/stocks/{ticker}:
    get:
      responses:
        "200":
          description: Ação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stock"
        default: *a1
      operationId: getStock
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
      summary: Perfil e última cotação do papel
  /v1/stocks/{ticker}/quotes:
    get:
      responses:
        "200":
          description: Página de cotações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Quote"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listQuotes
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20000
            default: 100
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: adjusted
          schema:
            type: string
      summary: Série de cotações OHLCV
      description: Ajustada por eventos por default; `from`/`to` filtram o período
        (from <= to).
  /v1/stocks/{ticker}/indicators:
    get:
      responses:
        "200":
          description: Indicadores do papel
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  reference_date:
                    type: string
                  is_financial:
                    type: boolean
                  indicators:
                    type: array
                    items:
                      $ref: "#/components/schemas/IndicatorValue"
                required:
                  - ticker
                  - reference_date
                  - is_financial
                  - indicators
        default: *a1
      operationId: getStockIndicators
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: names
          schema:
            type: string
        - in: query
          name: at
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Indicadores fundamentalistas (snapshot TTM)
  /v1/stocks/{ticker}/indicators/history:
    get:
      responses:
        "200":
          description: Série do indicador
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  name:
                    type: string
                  label:
                    type: string
                  unit:
                    type: string
                    enum: *a2
                  observations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"
                required:
                  - ticker
                  - name
                  - label
                  - unit
                  - observations
        default: *a1
      operationId: getStockIndicatorHistory
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: name
          schema:
            type: string
            minLength: 1
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
      summary: Histórico de um indicador (trimestral)
  /v1/stocks/{ticker}/dividends:
    get:
      responses:
        "200":
          description: Página de proventos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Dividend"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listDividends
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Proventos (dividendos e JCP)
  /v1/stocks/{ticker}/events:
    get:
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CorporateEvent"
        default: *a1
      operationId: listCorporateEvents
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Eventos societários (desdobramentos, grupamentos, bonificações)
  /v1/stocks/{ticker}/insider:
    get:
      responses:
        "200":
          description: Saldo mensal de insiders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InsiderMove"
                required:
                  - ticker
                  - data
        default: *a1
      operationId: listInsiderMoves
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Movimentações de insiders (CVM VLMO, por mês)
  /v1/screener/stocks:
    get:
      responses:
        "200":
          description: Página de resultados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScreenerRow"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: screenStocks
      tags:
        - Screener
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: pl_min
          schema:
            type: number
        - in: query
          name: pl_max
          schema:
            type: number
        - in: query
          name: pvp_min
          schema:
            type: number
        - in: query
          name: pvp_max
          schema:
            type: number
        - in: query
          name: dy_min
          schema:
            type: number
        - in: query
          name: roe_min
          schema:
            type: number
        - in: query
          name: ev_ebitda_max
          schema:
            type: number
        - in: query
          name: div_liq_ebitda_max
          schema:
            type: number
        - in: query
          name: sector
          schema:
            type: string
        - in: query
          name: segment
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
      summary: Filtra ações por múltiplos critérios fundamentalistas
  /v1/screener/fiis:
    get:
      responses:
        "200":
          description: Página de FIIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FiiListRow"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: screenFiis
      tags:
        - Screener
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: segment
          schema:
            type: string
        - in: query
          name: paper
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - in: query
          name: sort
          schema:
            type: string
      summary: Universo de FIIs filtrável por segmento e tijolo/papel
  /v1/macro/gears:
    get:
      responses:
        "200":
          description: Sinais por engrenagem
          content:
            application/json:
              schema:
                type: object
                properties:
                  as_of:
                    type:
                      - string
                      - "null"
                  gears:
                    type: array
                    items:
                      type: object
                      properties:
                        gear:
                          type: string
                        indicators:
                          type: array
                          items:
                            $ref: "#/components/schemas/RegimeSignal"
                      required:
                        - gear
                        - indicators
                required:
                  - as_of
                  - gears
        default: *a1
      operationId: getMacroGears
      tags:
        - Macro
      parameters:
        - in: query
          name: gear
          schema:
            type: string
            enum:
              - monetary
              - inflation
              - growth
              - employment
              - credit
              - fiscal
              - external
              - sovereign_risk
              - global
              - currency
              - cross_asset
        - in: query
          name: at
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Engrenagens macro (sinais por seção)
  /v1/macro/regime:
    get:
      responses:
        "200":
          description: Snapshot do regime
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegimeSnapshot"
        default: *a1
      operationId: getMacroRegime
      tags:
        - Macro
      parameters:
        - in: query
          name: at
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Regime econômico (quadrante crescimento × inflação)
  /v1/macro/expectations:
    get:
      responses:
        "200":
          description: Expectativas
          content:
            application/json:
              schema:
                type: object
                properties:
                  indicator:
                    type: string
                  reference:
                    type:
                      - string
                      - "null"
                  realized:
                    type:
                      - number
                      - "null"
                  surveys:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expectation"
                required:
                  - indicator
                  - reference
                  - realized
                  - surveys
        default: *a1
      operationId: getMarketExpectations
      tags:
        - Macro
      parameters:
        - in: query
          name: indicator
          schema:
            type: string
            enum:
              - ipca
              - selic
              - pib
              - cambio
          required: true
        - in: query
          name: reference
          schema:
            type: string
          required: false
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
      summary: Expectativas Focus (consenso por indicador)
  /v1/bonds/tesouro/yield-curve:
    get:
      responses:
        "200":
          description: Curva de juros
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type:
                      - string
                      - "null"
                  kind:
                    type: string
                    enum:
                      - nominal
                      - real
                  points:
                    type: array
                    items:
                      type: object
                      properties:
                        maturity:
                          type: string
                        years:
                          type:
                            - number
                            - "null"
                        rate:
                          type: number
                      required:
                        - maturity
                        - years
                        - rate
                required:
                  - date
                  - kind
                  - points
        default: *a1
      operationId: getYieldCurve
      tags:
        - Bonds
      parameters:
        - in: query
          name: date
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: kind
          schema:
            type: string
            enum:
              - nominal
              - real
            default: nominal
      summary: Curva de juros (Tesouro), um ponto por vencimento
  /v1/bonds/tesouro:
    get:
      responses:
        "200":
          description: Página de títulos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TesouroBondQuote"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listTesouroBonds
      tags:
        - Bonds
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: type
          schema:
            type: string
            enum:
              - LTN
              - NTN-F
              - NTN-B
              - NTN-B-Principal
              - LFT
              - RENDA+
              - EDUCA+
        - in: query
          name: maturity
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: date
          schema:
