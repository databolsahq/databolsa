        - Macro
      parameters:
        - in: query
          name: indicator
          schema:
            type: string
            enum:
              - ipca
              - selic
              - pib
              - cambio
          required: true
        - in: query
          name: reference
          schema:
            type: string
            description: "Ano de referência do consenso, ex.: '2026'. Omitir retorna TODAS
              as referências (mistura anos); informe um ano para uma série
              limpa."
          required: false
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
      summary: Expectativas Focus (consenso por indicador)
      description: Consenso do Boletim Focus (BCB) para ipca, selic, pib ou cambio.
        Informe `reference` (ano) para uma série limpa; sem ele, mistura todos
        os anos de referência.
