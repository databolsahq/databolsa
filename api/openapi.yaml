  /v1/search:
    get:
      responses:
        "200":
          description: Resultados ranqueados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"
        default: *a1
      operationId: search
      tags:
        - System
      parameters:
        - in: query
          name: q
          schema:
            type: string
            minLength: 1
            maxLength: 64
