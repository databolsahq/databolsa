        - series_id
        - name
        - label
        - unit
        - frequency
        - first_date
        - last_date
    Fii:
      type: object
      properties:
        ticker:
          type: string
        cnpj:
          type:
            - string
            - "null"
        name:
          type:
            - string
            - "null"
        segment:
          type:
            - string
            - "null"
        administrator:
          type:
            - string
