        - Carteira
      summary: Remover transação
      description: REMOVE uma transação do ledger da carteira REAL do dono da chave
        (irreversível). Confirme com o usuário antes de chamar.
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
        - name: txId
          in: path
          required: true
          description: Id da transação.
          schema:
            type: string
      responses:
        "200":
          description: Transação removida.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        default: *a3
  /v1/portfolios/{id}/imports:
    post:
      operationId: importPortfolioFile
      tags:
        - Carteira
      summary: Importar planilha (B3 ou template manual)
      description: "IMPORTA uma planilha para a carteira REAL do dono da chave:
        Negociação ou Movimentação da B3 (.xlsx) ou o template manual
        (.csv/.xlsx) — o formato é detectado automaticamente. Envie o arquivo em
        `content_base64` (máx. 8 MB). Idempotente: reenviar o mesmo arquivo não
        duplica lançamentos. A resposta resume o que entrou (importadas,
        duplicadas, ignoradas) e traz avisos."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content_base64
              properties:
                content_base64:
                  type: string
                  description: Conteúdo do arquivo em base64.
                filename:
                  type: string
                  description: Nome do arquivo (ajuda a trilha de auditoria).
      responses:
        "201":
          description: Resumo do import.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioImportSummary"
        default: *a3
    get:
      operationId: listPortfolioImports
      tags:
        - Carteira
      summary: Histórico de imports
      description: Lista os imports já feitos nesta carteira (arquivo, fonte, data e
        resumo persistido).
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      responses:
        "200":
          description: Imports da carteira.
          content:
            application/json:
              schema:
                type: object
                properties:
                  imports:
                    type: array
                    items:
                      $ref: "#/components/schemas/PortfolioImportListItem"
        default: *a3
  /v1/portfolios/{id}/imports/{importId}/rows:
    get:
      operationId: listPortfolioImportRows
      tags:
        - Carteira
      summary: Linhas de um import
      description: "Drill-down de um import: cada linha do arquivo com status
        (imported, ignored, duplicate, error) e motivo."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
        - name: importId
          in: path
          required: true
          description: Id do import (de listPortfolioImports).
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filtra por status.
          schema:
            type: string
            enum:
              - imported
              - ignored
              - duplicate
              - error
        - name: limit
          in: query
          required: false
          description: Linhas por página (1–500, default 100).
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: Offset de paginação.
          schema:
            type: integer
      responses:
        "200":
          description: Linhas do import.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/PortfolioImportRow"
        default: *a3
  /v1/portfolios/{id}/reconcile:
    post:
      operationId: reconcilePortfolioAsset
      tags:
        - Carteira
      summary: Reconciliar posição à B3
      description: "AJUSTA a posição calculada de um ativo à quantidade declarada pela
        B3 (`target_qty` na data `as_of`), inserindo um ajuste idempotente —
        útil quando um evento (ex.: subscrição) não veio no extrato. Confirme a
        quantidade com o usuário antes de chamar."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - asset_type
                - symbol
                - target_qty
                - as_of
              properties:
                asset_type:
                  type: string
                  description: Tipo do ativo.
                symbol:
                  type: string
                  description: Ticker.
                target_qty:
                  type: number
                  description: Quantidade declarada pela B3 (>= 0).
                as_of:
                  type: string
                  description: Data de referência (AAAA-MM-DD).
      responses:
        "200":
          description: Resultado do ajuste (delta aplicado).
          content:
            application/json:
              schema:
                type: object
        default: *a3
  /v1/suitability:
    get:
      operationId: getSuitability
      tags:
        - Carteira
      summary: Seu perfil de investidor
      description: "Retorna o perfil de investidor (suitability) do dono da chave:
        nível (Conservador/Moderado/Arrojado), a posição na régua 0–100 (não é
        uma nota) e as respostas do questionário. `profile` é nulo se o usuário
        ainda não definiu o perfil."
      responses:
        "200":
          description: Perfil de investidor do usuário (ou nulo).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuitabilityEnvelope"
        default: *a3
  /v1/documents/search:
    get:
      operationId: searchDocuments
      tags:
        - Documentos
      summary: Busca semântica em documentos
      description: Busca semântica no TEXTO de documentos CVM/B3 (fatos relevantes,
        releases de resultado, balanços, relatórios gerenciais de FII, atas de
        assembleia). Ideal para perguntas qualitativas que os dados estruturados
        não respondem. Filtre por papel, categoria e ano quando souber.
      parameters:
        - name: q
          in: query
          required: true
          description: Termo/pergunta em linguagem natural.
          schema:
            type: string
            minLength: 1
        - name: tickers
          in: query
          required: false
          description: "Filtra por papéis, ex.: PETR4,PRIO3."
          style: form
          explode: false
          schema:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
        - name: category
          in: query
          required: false
          description: Categoria bruta da fonte. Consulte /v1/documents/taxonomy para
            valores disponíveis.
          schema:
            type: string
            minLength: 1
        - name: document_kind
          in: query
          required: false
          description: Taxonomia estável da DataBolsa.
          schema:
            $ref: "#/components/schemas/DocumentKind"
        - name: entity_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - stock
              - fii
        - name: year
          in: query
          required: false
          description: Ano de referência do documento (AAAA).
          schema:
            type: integer
            minimum: 1900
            maximum: 2100
        - name: filed_before
          in: query
          required: false
          description: "Corte point-in-time: só documentos PROTOCOLADOS (filed_at) até
            esta data — o que estava publicamente disponível na data, não o
            período de referência. Documentos sem data de publicação conhecida
            são EXCLUÍDOS (a exclusão é sinalizada em warnings). A cobertura de
            filed_at do acervo histórico está em backfill; documentos ainda não
            cobertos ficam fora do corte em vez de aparecer com data inferida."
          schema:
            type: string
            format: date
        - name: filed_after
          in: query
          required: false
          description: Só documentos protocolados (filed_at) a partir desta data.
            Documentos sem data de publicação são excluídos.
          schema:
            type: string
            format: date
        - name: protocol
          in: query
          required: false
          description: Restringe a UM documento exato (protocolo CVM/FNET) — busca dentro
            do documento.
          schema:
            type: string
            minLength: 1
        - name: reference_date
          in: query
          required: false
          description: "Período de referência exato do documento (ex.: 2022-06-30 = 2T22)."
          schema:
            type: string
            format: date
        - name: reference_from
          in: query
          required: false
          description: Início do intervalo de reference_date (inclusivo).
          schema:
            type: string
            format: date
        - name: reference_to
          in: query
          required: false
          description: Fim do intervalo de reference_date (inclusivo).
          schema:
            type: string
            format: date
        - name: doc_type
          in: query
          required: false
          description: "Subtipo bruto da fonte (ex.: Press-release). Consulte
            /v1/documents/taxonomy."
          schema:
            type: string
            minLength: 1
        - name: tables_only
          in: query
          required: false
          description: Restringe a trechos de tabela (fatos numéricos).
          schema:
            type: boolean
        - name: financial_only
          in: query
          required: false
          description: Restringe a emissores financeiros quando true; false restringe aos
            demais.
          schema:
            type: boolean
        - name: include_context
          in: query
          required: false
          description: false devolve context vazio e reduz tokens; os chunks e citações
            continuam presentes.
          schema:
            type: boolean
            default: true
        - name: limit
          in: query
          required: false
          description: Máximo de trechos (1–25, default 8).
          schema:
            type: integer
            minimum: 1
            maximum: 25
            default: 8
      responses:
        "200":
          description: Trechos relevantes + bloco de contexto com citação.
          headers: &a4
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Segundos até o reinício da janela.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 1
              description: Segundos até o reinício da janela.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSearchResponse"
        "429": &a5
          description: Limite diário de requisições do plano atingido.
          headers: *a4
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default: *a3
  /v1/events/search:
    get:
      operationId: searchMarketEvents
      tags:
        - Events
      summary: Busca semântica no ledger de eventos de mercado
      description: "Busca por significado no histórico de eventos de mercado (decisões
        do Copom, medidas provisórias, tarifas, geopolítica, eventos
        corporativos relevantes). Complementa as leituras estruturadas de
        /v1/events: use quando a pergunta é temática ('renegociação de dívidas
        do agro', 'escalada no Oriente Médio') e depois aprofunde pelo
        event_id."
      parameters:
        - name: q
          in: query
          required: true
          description: Termo/pergunta em linguagem natural.
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          description: Máximo de eventos (1–25, default 8).
          schema:
            type: integer
            minimum: 1
            maximum: 25
            default: 8
      responses:
        "200":
          description: Eventos mais próximos semanticamente da consulta.
          headers: *a4
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketEventSearchResponse"
        "429": *a5
        default: *a3
  /v1/documents/taxonomy:
    get:
      operationId: getDocumentTaxonomy
      tags:
        - Documentos
      summary: Taxonomia e cobertura de documentos
      description: Lista os tipos normalizados, as categorias e subtipos brutos
        disponíveis no corpus, além dos anos e tipos de entidade cobertos. Use
        antes de filtrar searchDocuments por categoria.
      responses:
        "200":
          description: Facetas disponíveis no corpus indexado.
          headers: *a4
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentTaxonomy"
        "429": *a5
        default: *a3
