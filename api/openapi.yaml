      description: "Registro de ofertas públicas (IPO/follow-on de ações, debêntures,
        cotas de fundos), unificando o histórico ICVM 400/476 e o rito
        automático RCVM 160. Filtrável por emissor, regime, tipo de ativo e
        período de registro. Fonte: CVM."
  /v1/options/{ticker}/chain:
    get:
      responses:
        "200":
          description: Cadeia de opções
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionsChain"
        default: *a1
      operationId: getOptionsChain
      tags:
        - Options
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: expiry
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Filtra a cadeia por vencimento (YYYY-MM-DD). Ver
              listOptionExpiries.
        - in: query
          name: type
          schema:
            type: string
            enum:
              - call
              - put
            description: "Filtra por tipo: call ou put."
      summary: Cadeia de opções vigente de um subjacente
      description: Séries vivas (não vencidas) que negociaram; filtre por `expiry`/`type`.
