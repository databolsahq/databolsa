tags:
  - name: Companies
    description: Companhias abertas (cadastro CVM) e demonstrações
  - name: Stocks
    description: Ações — cotações, indicadores, proventos e eventos
  - name: Quotes
    description: Cotações ao vivo (delay de 15 min) — lote e séries intradiárias
  - name: FIIs
    description: Fundos imobiliários — indicadores e distribuições
  - name: Bonds
    description: Títulos públicos (Tesouro Direto) e curvas de juros
  - name: Crypto
    description: Criptoativos em BRL
  - name: Indices
    description: Índices da B3 (IBOV, IFIX, ...) e composições
  - name: Market
    description: Microestrutura de mercado — fluxo por perfil de investidor
  - name: Primary Market
    description: Mercado primário — ofertas públicas de distribuição (CVM)
  - name: BDR
    description: BDRs (recibos de ações estrangeiras) — catálogo e cotações
  - name: ETFs
    description: ETFs listados na B3 — catálogo (gestor, CNPJ, segmento)
  - name: Funds
    description: Fundos de investimento (CVM 175) — perfil, cota diária e screener
  - name: Options
    description: Opções sobre ações — cadeia vigente e histórico EOD
  - name: Macro
    description: Séries macroeconômicas, expectativas Focus e regime
  - name: Screener
    description: Filtros multi-critério sobre ações e FIIs
  - name: System
    description: Saúde e metadados da API
  - name: Carteira
    description: Carteira e perfil do usuário dono da chave de API
  - name: Documentos
    description: Busca semântica no texto de documentos CVM/B3
paths:
  /v1/health:
    get:
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default: &a1
          description: Erro (RFC 9457 application/problem+json)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
      operationId: getHealth
      tags:
        - System
      parameters: []
      summary: Status da API e frescor dos dados
      security: []
  /v1/companies:
    get:
      responses:
        "200":
          description: Página de companhias
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Company"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
