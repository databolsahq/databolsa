            - number
            - "null"
        monthly_dividend_yield_pct:
          type:
            - number
            - "null"
        shareholders:
          type:
            - number
            - "null"
        shares_issued:
          type:
            - number
            - "null"
      required:
        - reference_month
        - net_asset_value
        - value_per_share
        - monthly_dividend_yield_pct
        - shareholders
        - shares_issued
    BdrProfile:
      type: object
      properties:
        ticker:
          type: string
        name:
          type:
            - string
            - "null"
        isin:
          type:
            - string
            - "null"
        kind:
          type:
            - string
            - "null"
          description: patrocinado | nao_patrocinado
        spec:
          type:
            - string
            - "null"
        first_traded:
          type:
            - string
            - "null"
        last_traded:
          type:
            - string
            - "null"
        sessions:
          type:
            - number
            - "null"
      required:
        - ticker
        - name
        - isin
        - kind
        - spec
        - first_traded
        - last_traded
        - sessions
    BdrQuote:
      type: object
      properties:
        date:
          type: string
        open:
          type:
            - number
            - "null"
        high:
          type:
            - number
            - "null"
        low:
          type:
            - number
            - "null"
        close:
          type:
            - number
            - "null"
        close_raw:
          type:
            - number
            - "null"
        volume:
          type:
            - number
            - "null"
        adjust_quality:
          type:
            - string
            - "null"
      required:
        - date
        - open
        - high
        - low
        - close
        - close_raw
        - volume
        - adjust_quality
    OptionsChain:
      type: object
      properties:
        underlying_ticker:
          type: string
        date:
          type:
            - string
            - "null"
        count:
          type: number
        options:
          type: array
          items:
            $ref: "#/components/schemas/OptionContract"
      required:
        - underlying_ticker
        - date
        - count
        - options
    OptionContract:
      type: object
      properties:
        option_ticker:
          type: string
        underlying_ticker:
          type:
            - string
            - "null"
        underlying_root:
          type:
            - string
            - "null"
        option_type:
          type:
            - string
            - "null"
          description: call | put
        strike:
          type:
            - number
            - "null"
        expiry:
          type:
            - string
            - "null"
        date:
          type:
            - string
            - "null"
        last:
          type:
            - number
            - "null"
        volume_brl:
          type:
            - number
            - "null"
        trades:
          type:
            - number
            - "null"
        underlying_spot:
          type:
            - number
            - "null"
        days_to_expiry:
          type:
            - number
            - "null"
        moneyness:
          type:
            - number
            - "null"
          description: spot / strike
        intrinsic:
          type:
            - number
            - "null"
        time_value:
          type:
            - number
            - "null"
        iv:
          type:
            - number
            - "null"
          description: vol implícita anualizada (Black-Scholes europeu)
        delta:
          type:
            - number
            - "null"
        gamma:
          type:
            - number
            - "null"
        vega:
          type:
            - number
            - "null"
          description: por 1% de vol
        theta:
          type:
            - number
            - "null"
          description: por dia corrido
        iv_amer:
          type:
            - number
            - "null"
          description: IV americana (binomial CRR) — corrige exercício antecipado;
            relevante em puts
        delta_amer:
          type:
            - number
            - "null"
        gamma_amer:
          type:
            - number
            - "null"
        vega_amer:
          type:
            - number
            - "null"
          description: por 1% de vol
        theta_amer:
          type:
            - number
            - "null"
          description: por dia corrido
        early_ex_premium:
          type:
            - number
            - "null"
          description: "prêmio de exercício antecipado: preço americano − europeu (mesmo σ)"
      required:
        - option_ticker
        - underlying_ticker
        - underlying_root
        - option_type
        - strike
        - expiry
        - date
        - last
        - volume_brl
        - trades
        - underlying_spot
        - days_to_expiry
        - moneyness
        - intrinsic
        - time_value
        - iv
        - delta
        - gamma
        - vega
        - theta
        - iv_amer
        - delta_amer
        - gamma_amer
        - vega_amer
        - theta_amer
        - early_ex_premium
    OptionExpiries:
      type: object
      properties:
        underlying_ticker:
          type: string
        expiries:
          type: array
          items:
            type: object
            properties:
