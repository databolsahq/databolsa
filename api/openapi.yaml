          schema:
            type: string
            enum:
              - IBOV
              - IFIX
              - USDBRL
              - BRENT
              - VIX
              - SP500
              - NASDAQ
        - in: query
          name: min_z
          schema:
            type: number
            minimum: 3
            maximum: 20
            default: 4
            description: Corte de |z-score| (default 4).
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Dias anômalos de mercado (z-score) e o evento que os explica
      description: Dias em que uma série acompanhada (IBOV, IFIX, dólar, brent, VIX,
        S&P 500) se moveu N desvios-padrão além do regime dos 252 pregões
        anteriores (histórico desde 1968), com o evento explicador quando
        casado. Um dia anômalo sem explicação é lacuna de cobertura do ledger,
        não ausência de causa.
