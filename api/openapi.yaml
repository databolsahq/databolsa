          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post + respostas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/CommunityItem"
        default: *a3
  /v1/theses:
    get:
      operationId: listMyTheses
      tags:
        - Teses
      summary: Minhas teses
      description: "Lista as teses do dono da chave (resumo: título, ticker,
        visibilidade, status de export) e o teto do plano. O documento completo
        vem no getThesis."
      responses:
        "200":
          description: Teses + limite do plano (null = ilimitado).
          content:
            application/json:
              schema:
                type: object
                properties:
                  theses:
                    type: array
                    items:
                      $ref: "#/components/schemas/ThesisSummary"
                  limit:
                    type: number
                    nullable: true
        default: *a3
    post:
      operationId: createThesis
      tags:
        - Teses
      summary: Criar tese
      description: "Cria uma tese a partir de um documento de report estruturado
        (`doc`). O doc é validado no servidor contra o schema de reports (seções
        → blocos: cover, rating, summary, keyStats, prose, chart, table,
        callout, scenarios, sources, disclaimer…); erros voltam com o caminho do
        campo. Título/ticker/tipo são derivados do próprio doc. Respeita o
        limite de teses do plano (402 plan_required ao estourar)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - doc
              properties:
                doc:
                  $ref: "#/components/schemas/ReportDocInput"
                visibility:
                  type: string
                  enum:
                    - private
                    - unlisted
                    - public
                  description: "Default: private."
      responses:
        "201":
          description: Tese criada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  thesis:
                    $ref: "#/components/schemas/ThesisDetail"
        default: *a3
  /v1/theses/reorder:
    post:
      operationId: reorderTheses
      tags:
        - Teses
      summary: Reordenar a vitrine
      description: Define a ordem manual das suas teses (perfil público +
        gerenciador). Envie `ids` na ordem desejada; as teses listadas ganham
        posição 0,1,2…, as demais voltam a ordenar por data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Ids das teses na ordem desejada.
      responses:
        "200":
          description: Ordem salva.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        default: *a3
  /v1/theses/import:
    post:
      operationId: importThesisFile
      tags:
        - Teses
      summary: Importar tese de arquivo JSON
      description: Cria uma tese enviando o ARQUIVO JSON do documento em base64
        (`content_base64`) — o caminho natural para CLI e automações (`--file
        tese.json`). Mesma validação e limites do createThesis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content_base64
              properties:
                filename:
                  type: string
                  description: Nome do arquivo (informativo).
                content_base64:
                  type: string
                  description: JSON do ReportDoc codificado em base64.
                visibility:
                  type: string
                  enum:
                    - private
                    - unlisted
                    - public
      responses:
        "201":
          description: Tese criada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  thesis:
                    $ref: "#/components/schemas/ThesisDetail"
        default: *a3
  /v1/theses/{id}:
    get:
      operationId: getThesis
      tags:
        - Teses
      summary: Detalhe de uma tese
      description: Documento completo + visibilidade + status do export (quando
        `ready`, `pdfUrl`/`previewUrl` apontam para a mídia pública).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tese.
          content:
            application/json:
              schema:
                type: object
                properties:
                  thesis:
                    $ref: "#/components/schemas/ThesisDetail"
        default: *a3
    put:
      operationId: updateThesis
      tags:
        - Teses
      summary: Atualizar tese
      description: Atualiza o documento, a visibilidade, o arquivamento e/ou as tags.
        O doc, quando enviado, passa pela mesma validação do create. `archived`
        esconde a tese do público sem apagar; `tags` são rótulos PRIVADOS de
        organização (só o dono vê, nunca aparecem na página pública).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doc:
                  $ref: "#/components/schemas/ReportDocInput"
                visibility:
                  type: string
                  enum:
                    - private
                    - unlisted
                    - public
                archived:
                  type: boolean
                  description: true arquiva (some do público), false desarquiva.
                tags:
                  type: array
                  items:
                    type: string
                  description: Rótulos privados (substitui o conjunto; máx. 12).
      responses:
        "200":
          description: Tese atualizada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  thesis:
                    $ref: "#/components/schemas/ThesisDetail"
        default: *a3
    delete:
      operationId: deleteThesis
      tags:
        - Teses
      summary: Excluir tese
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Excluída.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        default: *a3
  /v1/theses/{id}/publish:
    post:
      operationId: publishThesis
      tags:
        - Teses
      summary: Publicar / mudar visibilidade
      description: "Define a visibilidade: `public` aparece no perfil e tem página
        própria; `unlisted` só por link; `private` volta a ser só sua. O doc
        publicado vai INTEIRO (revisar antes é do autor); leitores anônimos veem
        só a capa e precisam entrar para ler o resto."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - visibility
              properties:
                visibility:
                  type: string
                  enum:
                    - private
                    - unlisted
                    - public
      responses:
        "200":
          description: Visibilidade atualizada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  thesis:
                    $ref: "#/components/schemas/ThesisDetail"
        default: *a3
  /v1/theses/{id}/export:
    post:
      operationId: exportThesis
      tags:
        - Teses
      summary: Exportar em PDF (plano pago)
      description: "Gera o PDF (A4, com preview PNG) da tese e publica num link
        público de mídia. Assíncrono: responde 202 {status: queued} e o
        getThesis passa a devolver `pdfUrl` quando pronto; se o conteúdo não
        mudou desde o último export, responde 200 direto com o link. O PDF traz
        o doc inteiro."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Já exportada (conteúdo inalterado).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThesisExportStatus"
        "202":
          description: Export enfileirado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThesisExportStatus"
        default: *a3
