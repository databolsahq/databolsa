      description: "Participação MTD (mês a mês) de cada perfil — Estrangeiro,
        Institucionais, PF, Instituições Financeiras, Outros — em compras/vendas
        (R$ mil e %), com fluxo líquido diário derivado. Fonte: Boletim Diário
        do Mercado (BDM/BDI) da B3."
  /v1/market/investor-flow/monthly:
    get:
      responses:
        "200":
          description: Página de fluxo mensal
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvestorFlowMonthly"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
