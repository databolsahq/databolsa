  /v1/search:
    get:
      responses:
        "200":
          description: Resultados ranqueados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"
        default: *a1
      operationId: search
      tags:
        - System
      parameters:
        - in: query
          name: q
          schema:
            type: string
            minLength: 1
            maxLength: 64
            description: Termo de busca (ticker ou nome) — ações, FIIs, ETFs, BDRs, índices,
              títulos do Tesouro, séries macro, cripto e ativos dos EUA.
              Acento-insensível; ótimo p/ resolver ticker↔nome.
          required: true
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          required: false
      summary: Busca unificada (typeahead) por
        ações/FIIs/ETFs/BDRs/índices/títulos/macro/cripto/EUA
  /v1/ingest:
    get:
      responses:
        "200":
          description: Saúde da ingestão
          content:
            application/json:
              schema:
                type: object
                properties:
                  latest:
                    oneOf:
                      - allOf:
                          - $ref: "#/components/schemas/IngestRunSummary"
                        properties:
                          errors:
                            type: array
                            items:
                              type: string
                        required:
                          - errors
                      - type: "null"
                  sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestSourceHealth"
                  recent_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestRunSummary"
                required:
                  - latest
                  - sources
                  - recent_runs
        default: *a1
      operationId: getIngestHealth
      tags:
        - System
      parameters: []
      summary: Saúde da ingestão (última run, fontes, histórico)
  /v1/news/edition:
    get:
      operationId: getNewsEdition
      tags:
        - Notícias
      summary: Edição de notícias (a mais recente ou de uma data)
      description: Retorna a edição publicada mais recente (ou de uma data específica
        via `date`), com o resumo do dia, o humor de mercado, os destaques e
        todos os itens (`items`). Cada item traz `why` (por que importa),
        `impact` e a fonte. Use para saber o que aconteceu no pregão e o
        contexto editorial já sintetizado.
      parameters:
        - name: date
          in: query
          required: false
          description: Data da edição (AAAA-MM-DD). Omita p/ a mais recente.
          schema:
            type: string
      responses:
        "200":
          description: Edição publicada + itens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsEditionEnvelope"
        default: &a3
          description: Erro (RFC 9457 application/problem+json)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/news/dates:
    get:
      operationId: listNewsDates
      tags:
        - Notícias
      summary: Datas com edição publicada
      description: Lista as datas com pelo menos uma edição publicada (recentes
        primeiro) e os períodos (slots) de cada dia. Útil p/ navegar edições
        passadas.
      responses:
        "200":
          description: Datas + slots.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsDatesResponse"
        default: *a3
  /v1/news/feed:
    get:
      operationId: listNewsFeed
      tags:
        - Notícias
      summary: Feed de notícias ranqueado
      description: Feed paginado de itens das edições recentes, ordenado por
        relevância. Filtre por `category` e pagine com `cursor` (use o
        `nextCursor` da resposta anterior).
      parameters:
        - name: limit
          in: query
          required: false
          description: Itens por página (1–50, default 20).
          schema:
            type: integer
        - name: cursor
          in: query
          required: false
          description: Offset de paginação (do `nextCursor` anterior).
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Filtra por categoria/linha editorial.
          schema:
            type: string
      responses:
        "200":
          description: Página de itens + `nextCursor`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsFeedResponse"
        default: *a3
  /v1/news/item/{slug}:
    get:
      operationId: getNewsItem
      tags:
        - Notícias
      summary: Item de notícia + relacionadas
      description: Retorna um item pelo `slug`, com o corpo completo (`body`), as
        fontes citadas (`sources`) e itens relacionados.
      parameters:
        - name: slug
          in: path
          required: true
          description: Slug do item (do campo `slug` do feed/edição).
          schema:
            type: string
      responses:
        "200":
          description: Item + relacionadas.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItemEnvelope"
        default: *a3
  /v1/news/stories:
    get:
      operationId: listNewsStories
      tags:
        - Notícias
      summary: Stories do dia
      description: Retorna as stories (formato vertical, cartões encadeados) da
        publicação mais recente. Cada story tem um `ring` (rótulo), `mark` e uma
        lista de `cards`.
      responses:
        "200":
          description: Stories do dia.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsStoriesResponse"
        default: *a3
  /v1/news/agenda:
    get:
      operationId: getNewsAgenda
      tags:
        - Notícias
      summary: "Agenda: proventos, macro e resultados"
      description: "Agenda forward: proventos com data-ex próxima (`mercado`), eventos
        macro conhecidos (`macro`) e o calendário de divulgação de resultados
        (`resultados`, `status` previsto até confirmar com o Fato Relevante)."
      parameters:
        - name: days
          in: query
          required: false
          description: Janela em dias (1–90, default 30).
          schema:
            type: integer
      responses:
        "200":
          description: Agenda consolidada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsAgendaResponse"
        default: *a3
  /v1/portfolio:
    get:
      operationId: getPortfolio
      tags:
        - Carteira
      summary: Sua carteira (consolidada)
      description: "Retorna a carteira consolidada do dono da chave de API:
        patrimônio, total investido, P&L realizado e não-realizado, variação do
        dia, composição por classe, TODAS as posições (`positions`, maiores
        primeiro) e quebra por carteira. Exige uma chave de API por usuário
        (crie em https://databolsa.com/conta)."
      responses:
        "200":
          description: Carteira consolidada do usuário.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioContext"
        default: *a3
  /v1/portfolio/history:
    get:
      operationId: getPortfolioHistory
      tags:
        - Carteira
      summary: Histórico mensal consolidado
      description: "Série mensal do patrimônio consolidado do dono da chave: valor de
        mercado, aporte acumulado, proventos recebidos e resultado realizado,
        mês a mês. Exclui carteiras marcadas como simulação."
      responses:
        "200":
          description: Pontos mensais.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioHistoryResponse"
        default: *a3
  /v1/portfolios:
    get:
      operationId: listPortfolios
      tags:
        - Carteira
      summary: Suas carteiras
      description: Lista as carteiras do dono da chave (id, nome, nº de ativos, flag
        de simulação). Use o `id` nas demais operações de carteira.
      responses:
        "200":
          description: Carteiras da conta.
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolios:
                    type: array
                    items:
                      $ref: "#/components/schemas/PortfolioListItem"
        default: *a3
    post:
      operationId: createPortfolio
      tags:
        - Carteira
      summary: Criar carteira
      description: CRIA uma carteira REAL na conta do dono da chave. O número de
        carteiras é limitado pelo plano (resposta 402 quando o teto é atingido).
        Nome único por conta (409 em duplicidade).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Nome da carteira (até 60 caracteres, único na conta).
                visibility:
                  type: string
                  enum:
                    - private
                    - unlisted
                    - public
                  description: Visibilidade (default private).
      responses:
        "201":
          description: Carteira criada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioListItem"
        default: *a3
  /v1/portfolios/import-template:
    get:
      operationId: getPortfolioImportTemplate
      tags:
        - Carteira
      summary: Template CSV de import manual
      description: "Baixa o template CSV de preenchimento manual (colunas: ticker,
        operacao, data, quantidade, preco) aceito pelo import de planilha."
      responses:
        "200":
          description: Arquivo CSV.
          content:
            text/csv:
              schema:
                type: string
        default: *a3
  /v1/portfolios/{id}:
    get:
      operationId: getPortfolioDetail
      tags:
        - Carteira
      summary: Detalhe de uma carteira
      description: "Carteira computada: posições com preço médio, quantidade, valor de
        mercado, P&L, proventos e alocação, além dos totais. A posição é
        derivada do ledger de transações."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira (de listPortfolios).
          schema:
            type: string
      responses:
        "200":
          description: Carteira computada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioDetail"
        default: *a3
    patch:
      operationId: updatePortfolio
      tags:
        - Carteira
      summary: Editar carteira
      description: "ALTERA a carteira REAL do dono da chave: renomeia (`name`), muda a
        visibilidade (`visibility`) e/ou marca como simulação
        (`exclude_from_consolidated`, fora do consolidado). Informe ao menos um
        campo."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Novo nome (até 60 caracteres, único na conta).
                visibility:
                  type: string
                  enum:
                    - private
                    - unlisted
                    - public
                  description: Nova visibilidade.
                exclude_from_consolidated:
                  type: boolean
                  description: true = carteira de simulação (fora do consolidado).
      responses:
        "200":
          description: Campos alterados.
          content:
            application/json:
              schema:
                type: object
        default: *a3
    delete:
      operationId: deletePortfolio
      tags:
        - Carteira
      summary: Apagar carteira
      description: APAGA a carteira REAL do dono da chave, com TODOS os ativos e
        transações (cascata, irreversível). Confirme com o usuário antes de
        chamar.
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      responses:
        "200":
          description: Carteira apagada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        default: *a3
  /v1/portfolios/{id}/history:
    get:
      operationId: getPortfolioHistoryById
      tags:
        - Carteira
      summary: Histórico mensal de uma carteira
      description: Série mensal (patrimônio, aporte, proventos, realizado) de UMA
        carteira específica.
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      responses:
        "200":
          description: Pontos mensais.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioHistoryResponse"
        default: *a3
  /v1/portfolios/{id}/assets:
    post:
      operationId: addPortfolioAsset
      tags:
        - Carteira
      summary: Adicionar ativo à carteira
      description: "ADICIONA um ativo à carteira REAL do dono da chave (idempotente —
        repetir não duplica). Ativo sem transações funciona como watchlist;
        lance transações para rastrear posição. Para Tesouro Direto use o nome
        oficial do título (ex.: TESOURO SELIC 2029)."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - asset_type
                - symbol
              properties:
                asset_type:
                  type: string
                  enum:
                    - stock
                    - fii
                    - bdr
                    - index
                    - tesouro
                    - crypto
                    - option
                    - renda_fixa
                    - us
                  description: Tipo do ativo.
                symbol:
                  type: string
                  description: "Ticker (ex.: PETR4) ou nome oficial do título do Tesouro."
      responses:
        "201":
          description: Ativo na carteira.
          content:
            application/json:
              schema:
                type: object
        default: *a3
    delete:
      operationId: removePortfolioAsset
      tags:
        - Carteira
      summary: Remover ativo da carteira
      description: REMOVE um ativo da carteira REAL do dono da chave, APAGANDO o
        ledger de transações dele nesta carteira (cascata, irreversível).
        Confirme com o usuário antes de chamar.
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
        - name: asset_type
          in: query
          required: true
          description: Tipo do ativo.
          schema:
            type: string
            enum:
              - stock
              - fii
              - bdr
              - index
              - tesouro
              - crypto
              - option
              - renda_fixa
              - us
        - name: symbol
          in: query
          required: true
          description: Ticker ou nome do título.
          schema:
            type: string
      responses:
        "200":
          description: Ativo removido.
          content:
            application/json:
              schema:
                type: object
        default: *a3
    patch:
      operationId: updatePortfolioAsset
      tags:
        - Carteira
      summary: Taxa contratada de renda fixa
      description: "DEFINE a taxa contratada de uma posição de renda fixa (para o
        cálculo de rendimento): `rf_indexer` (cdi = % do CDI, prefixado = %
        a.a., ipca = IPCA + % a.a.) e `rf_rate`. Use `rf_indexer: none` para
        limpar."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
        - name: asset_type
          in: query
          required: true
          description: Tipo do ativo (renda_fixa/tesouro).
          schema:
            type: string
        - name: symbol
          in: query
          required: true
          description: Código do papel.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rf_indexer
              properties:
                rf_indexer:
                  type: string
                  enum:
                    - cdi
                    - prefixado
                    - ipca
                    - none
                  description: Indexador (none limpa a taxa).
                rf_rate:
                  type: number
                  description: "Taxa (ex.: 110 = 110% do CDI; 6.2 = IPCA+6,2%)."
      responses:
        "200":
          description: Meta da posição.
          content:
            application/json:
              schema:
                type: object
        default: *a3
  /v1/portfolios/{id}/transactions:
    get:
      operationId: listPortfolioTransactions
      tags:
        - Carteira
      summary: Ledger de um ativo
      description: Lista as transações (compras, vendas, splits, ajustes) de um ativo
        da carteira, em ordem cronológica.
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
        - name: asset_type
          in: query
          required: true
          description: Tipo do ativo.
          schema:
            type: string
        - name: symbol
          in: query
          required: true
          description: Ticker ou nome do título.
          schema:
            type: string
      responses:
        "200":
          description: Transações do ativo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PortfolioTransaction"
        default: *a3
    post:
      operationId: addPortfolioTransaction
      tags:
        - Carteira
      summary: Lançar transação
      description: LANÇA uma transação na carteira REAL do dono da chave. Se o ativo
        ainda não está na carteira, ele é adicionado automaticamente — "compra
        de 100 PETR4" é uma única chamada. buy/sell exigem `quantity`; `price` é
        opcional (custo desconhecido); split usa `ratio` (2 = 2:1). Confirme
        valores com o usuário.
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - asset_type
                - symbol
                - kind
                - trade_date
              properties:
                asset_type:
                  type: string
                  enum:
                    - stock
                    - fii
                    - bdr
                    - index
                    - tesouro
                    - crypto
                    - option
                    - renda_fixa
                    - us
                  description: Tipo do ativo.
                symbol:
                  type: string
                  description: "Ticker (ex.: PETR4) ou nome oficial do título do Tesouro."
                kind:
                  type: string
                  enum:
                    - buy
                    - sell
                    - split
                  description: Tipo da transação.
                trade_date:
                  type: string
                  description: Data do negócio (AAAA-MM-DD).
                quantity:
                  type: number
                  description: Quantidade (> 0; obrigatória em buy/sell).
                price:
                  type: number
                  description: Preço unitário em BRL (omita se desconhecido).
                fees:
                  type: number
                  description: Custos/corretagem em BRL (default 0).
                ratio:
                  type: number
                  description: Fator do split (2 = 2:1; 0.5 = grupamento 1:2).
                note:
                  type: string
                  description: Observação livre (até 280 caracteres).
      responses:
        "201":
          description: Transação lançada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction:
                    $ref: "#/components/schemas/PortfolioTransaction"
        default: *a3
  /v1/portfolios/{id}/transactions/{txId}:
    patch:
      operationId: updatePortfolioTransaction
      tags:
        - Carteira
      summary: Editar transação
      description: "ALTERA uma transação existente da carteira REAL do dono da chave
        (patch parcial: informe só os campos a mudar). Confirme com o usuário
        antes de chamar."
      parameters:
        - name: id
          in: path
          required: true
          description: Id da carteira.
          schema:
            type: string
        - name: txId
          in: path
          required: true
          description: Id da transação (de listPortfolioTransactions).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum:
                    - buy
                    - sell
                    - split
                  description: Tipo da transação.
                trade_date:
                  type: string
                  description: Data do negócio (AAAA-MM-DD).
                quantity:
                  type: number
                  description: Quantidade.
                price:
                  type: number
                  description: Preço unitário em BRL.
                fees:
                  type: number
                  description: Custos em BRL.
                ratio:
                  type: number
                  description: Fator do split.
                note:
                  type: string
                  description: Observação.
      responses:
        "200":
          description: Transação atualizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioTransaction"
        default: *a3
    delete:
      operationId: deletePortfolioTransaction
