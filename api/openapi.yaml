      description: Documento de report estruturado, com seções e blocos discriminados
        por `kind`. O schema é gerado do mesmo validador que aceita escritas no
        servidor; erros voltam com o caminho do campo violado.
    CommunityBot:
      type: object
      properties:
        id:
          type: string
        handle:
          type: string
        display_name:
          type: string
        bio:
          type:
            - string
            - "null"
        status:
          type: string
          description: active | suspended | disabled
        created_at:
          type: string
          format: date-time
    CommunityItem:
      type: object
      description: Post da comunidade (raiz) com autor, contadores e respostas.
      properties:
        id:
          type: string
        author:
          type: object
          properties:
            name:
              type: string
            handle:
              type:
                - string
                - "null"
            kind:
              type: string
              description: user | official | bot ("bot" = publicado por bot registrado).
            plan:
              type: string
              enum:
                - free
                - pro
                - max
              description: Plano público da conta autora. Ausente para conta oficial, bots e
                personas.
        time:
          type: string
          format: date-time
        ticker:
          type: string
        title:
          type: string
        body:
          type: string
        text:
          type: string
        votes:
          type: integer
        views:
          type: integer
        replyCount:
          type: integer
        replies:
          type: array
          items:
            type: object
        cashtags:
          type: array
          description: Cashtags do texto com tipo resolvido no servidor (ausente em posts
            antigos).
          items:
            type: object
            properties:
              symbol:
                type: string
              kind:
                type: string
                description: stock | fii | index | crypto | us
              href:
                type: string
                description: Rota da página do ativo no site.
            required:
              - symbol
              - kind
              - href
    PortfolioHolding:
      type: object
      description: Posição computada da carteira (snake_case, como todo o /v1).
        `asset_type` e `transactions[].trade_date` são os MESMOS campos do
        ledger (listPortfolioTransactions). Valores monetários sempre em BRL;
        ativos em moeda estrangeira (asset_type=us) expõem também currency,
        price_native (US$) e fx_rate.
      properties:
        symbol:
          type: string
        asset_type:
          type: string
          description: stock | fii | etf | bdr | fund | tesouro | rf | crypto | us.
        name:
          type: string
        qty:
          type: number
        avg_price:
          type:
            - number
            - "null"
          description: Preço médio de custo (null = custo desconhecido/watchlist).
        invested_cost:
          type:
            - number
            - "null"
        cost_basis_known:
          type: boolean
          description: true quando todos os buy/sell têm preço → P&L confiável.
        price:
          type:
            - number
            - "null"
          description: Cotação atual em BRL (null = sem cotação).
        change_pct:
          type:
            - number
            - "null"
        market_value:
          type:
            - number
            - "null"
        unrealized_pl:
          type:
            - number
            - "null"
        unrealized_pct:
          type:
            - number
            - "null"
        realized_pl:
          type:
            - number
            - "null"
        realized_by_month:
          type: object
          additionalProperties:
            type: number
          description: "'AAAA-MM' → R$ realizado no mês."
        income_received:
          type: number
          description: Proventos recebidos acumulados (R$).
        income_by_month:
          type: object
          additionalProperties:
            type: number
          description: "'AAAA-MM' → R$ de proventos no mês."
        weight_pct:
          type:
            - number
            - "null"
        day_change_brl:
          type:
            - number
            - "null"
        added_at:
          type:
            - string
            - "null"
          description: Data da 1ª transação (AAAA-MM-DD).
        tx_count:
          type: integer
          description: Nº de transações da posição.
        closed:
          type: boolean
          description: qty = 0 com transações (posição encerrada).
        is_watchlist:
          type: boolean
          description: Entrada sem nenhuma transação (radar).
        priced:
          type: boolean
        renamed_to:
          type:
            - string
            - "null"
          description: Ticker vigente quando o papel foi renomeado/incorporado.
        currency:
          type: string
          description: Moeda nativa de negociação (BRL | USD).
        price_native:
          type:
            - number
            - "null"
          description: Cotação na moeda nativa quando ≠ BRL.
        fx_rate:
          type:
            - number
            - "null"
          description: Câmbio usado na marcação (price = price_native × fx_rate).
        asset_id:
          type:
            - string
            - "null"
          description: Id do ativo no ledger (correlaciona com /assets e /transactions).
        meta:
          description: "portfolio_assets.meta (ex.: { rf: { indexer, rate } })."
        transactions:
          type: array
          description: Ledger da posição, ordenado por trade_date.
          items:
            $ref: "#/components/schemas/PortfolioTransaction"
      required:
        - symbol
        - asset_type
        - qty
    PortfolioByCarteira:
      type: object
      properties:
        name:
          type: string
        patrimonio:
          type: number
        unrealized_pct:
          type: number
        assets:
          type: integer
      required:
        - name
        - patrimonio
        - unrealized_pct
        - assets
    PortfolioListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        count:
          type: integer
          description: Nº de ativos na carteira.
        created_at:
          type: string
          format: date-time
        exclude_from_consolidated:
          type: boolean
          description: true = carteira de simulação.
      required:
        - id
        - name
    PortfolioDetail:
      type: object
      description: "Carteira computada: posições derivadas do ledger + métricas
        agregadas (snake_case)."
      properties:
        id:
          type: string
        name:
          type: string
        visibility:
          type: string
        created_at:
          type:
            - string
            - "null"
        exclude_from_consolidated:
          type: boolean
          description: true = carteira de simulação.
        assets:
          type: integer
          description: Posições abertas + entradas de watchlist.
        open_positions:
          type: integer
        patrimonio:
          type: number
        invested:
          type: number
        unrealized_pl:
          type: number
        unrealized_pct:
          type: number
        realized_pl:
          type: number
        realized_by_month:
          type: object
          additionalProperties:
            type: number
        income_received:
          type: number
        income_by_month:
          type: object
          additionalProperties:
            type: number
        total_pl:
          type: number
          description: unrealized_pl + realized_pl.
        day_change_brl:
          type: number
        day_change_pct:
          type: number
        kind_mix:
          type: string
          description: "Resumo humano, ex.: '3 ações · 2 FIIs'."
        is_watchlist:
          type: boolean
        any_unpriced:
          type: boolean
        any_cost_unknown:
          type: boolean
        holdings:
          type: array
          description: Posições com qty, preço médio, valor de mercado, P&L, proventos e
            peso.
          items:
            $ref: "#/components/schemas/PortfolioHolding"
    PortfolioTransaction:
      type: object
      description: Transação do ledger. É o MESMO shape das transações embutidas em
        PortfolioHolding.transactions.
      properties:
        id:
          type: string
        kind:
          type: string
          description: buy | sell | split | adjust
        trade_date:
          type: string
          description: AAAA-MM-DD
        quantity:
          type: number
        price:
          type:
            - number
            - "null"
          description: Preço unitário (null = custo desconhecido).
        fees:
          type: number
        ratio:
          type:
            - number
            - "null"
          description: Fator do split (só kind=split).
        currency:
          type: string
        note:
          type:
            - string
            - "null"
      required:
        - id
        - kind
        - trade_date
        - quantity
    PortfolioHistoryResponse:
      type: object
      properties:
        points:
          type: array
          description: "Um ponto por mês: patrimônio, aporte acumulado, proventos e
            realizado."
          items:
            type: object
    PortfolioImportSummary:
      type: object
      description: Resumo de um import de planilha (o detalhe linha a linha fica em
        listPortfolioImportRows).
      properties:
        import_id:
          type: string
        source:
          type: string
          description: negociacao | movimentacao | manual (detectado pelo cabeçalho).
        parsed:
          type: integer
          description: Linhas entendidas no arquivo.
        imported:
          type: integer
          description: Lançamentos novos gravados.
        duplicates_skipped:
          type: integer
          description: Lançamentos já existentes (reimport) pulados.
        rows_ignored:
          type: integer
        cross_source_skipped:
          type: integer
          description: Trades pulados por já estarem cobertos por outra fonte.
        symbols:
          type: integer
        period:
          type: object
          properties:
            from:
              type:
                - string
                - "null"
            to:
              type:
                - string
                - "null"
        warnings:
          type: array
          items:
            type: string
          description: Até 10 avisos.
        warnings_truncated:
          type: integer
          description: Nº de avisos omitidos além dos 10 primeiros.
      required:
        - import_id
        - source
        - imported
    PortfolioImportListItem:
      type: object
      properties:
        id:
          type: string
        filename:
          type:
            - string
            - "null"
        source:
          type: string
        created_at:
          type: string
          format: date-time
        summary:
          type: object
        warnings:
          type: array
          items:
            type: string
      required:
        - id
        - source
    PortfolioImportRow:
      type: object
      properties:
        row_index:
          type: integer
        status:
          type: string
          description: imported | ignored | duplicate | error
        kind:
          type:
            - string
            - "null"
        label:
          type:
            - string
            - "null"
        reason:
          type:
            - string
            - "null"
        external_id:
          type:
            - string
            - "null"
        raw: {}
      required:
        - row_index
        - status
    PortfolioPosition:
      type: object
      description: Posição resumida do consolidado (o detalhe completo vem em
        getPortfolioDetail).
      properties:
        symbol:
          type: string
        asset_type:
          type: string
        qty:
          type: number
        weight_pct:
          type:
            - number
            - "null"
        market_value:
          type:
            - number
            - "null"
        unrealized_pct:
          type:
            - number
            - "null"
      required:
        - symbol
        - asset_type
        - qty
    PortfolioContext:
      type: object
      description: Carteira consolidada do usuário (mesmo resumo que o agente de IA usa).
      properties:
        has_portfolio:
          type: boolean
        carteiras:
          type: integer
        patrimonio:
          type: number
        invested:
          type: number
        unrealized_pl:
          type: number
        unrealized_pct:
          type: number
        realized_pl:
          type: number
        day_change_brl:
          type: number
        kind_mix:
          type: string
        any_unpriced:
          type: boolean
        positions:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioPosition"
          description: Todas as posições consolidadas (qty > 0), ordenadas por valor
            (maiores primeiro).
        by_carteira:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioByCarteira"
      required:
        - has_portfolio
        - carteiras
        - patrimonio
        - invested
        - unrealized_pl
        - unrealized_pct
        - realized_pl
        - day_change_brl
        - kind_mix
        - any_unpriced
        - positions
        - by_carteira
    SuitabilityProfile:
      type: object
      properties:
        level:
          type: string
          enum:
            - Conservador
            - Moderado
            - Arrojado
        score:
          type: integer
          description: Posição na régua 0–100 (Conservador→Arrojado), não uma nota.
        answers:
          type: array
          items:
            type: object
            properties:
              q:
                type: string
              a:
                type: string
            required:
              - q
              - a
        updatedAt:
          type: string
      required:
        - level
        - score
        - answers
        - updatedAt
    SuitabilityEnvelope:
      type: object
      properties:
        profile:
          oneOf:
            - $ref: "#/components/schemas/SuitabilityProfile"
            - type: "null"
      required:
        - profile
    DocumentKind:
      type: string
      enum:
        - material_fact
        - market_communication
        - financial_report
        - shareholder_notice
        - shareholder_meeting
        - periodic_report
        - management_report
        - other
    DocumentCitation:
      type: object
      properties:
        ticker:
          type:
            - string
            - "null"
        company_name:
          type:
            - string
            - "null"
        doc_category:
          type:
            - string
            - "null"
          description: Categoria bruta da fonte.
        doc_type_raw:
          type:
            - string
            - "null"
          description: Subtipo bruto da fonte.
        document_kind:
          $ref: "#/components/schemas/DocumentKind"
        reference_date:
          type:
            - string
            - "null"
          format: date
          description: "Período a que o documento se REFERE (ex.: fim do trimestre
            coberto). Não é a data de publicação."
        filed_at:
          type:
            - string
            - "null"
          format: date
          description: Data em que o documento foi PROTOCOLADO/publicado na fonte
            (Data_Entrega). É a data que define disponibilidade point-in-time;
            pode ser semanas depois de reference_date.
        filed_at_source:
          type:
            - string
            - "null"
          enum:
            - source
            - null
          description: 'Qualidade de filed_at: "source" = veio da fonte oficial; null = a
            fonte não forneceu (nunca há fallback para reference_date).'
        protocol:
          type:
            - string
            - "null"
          description: Identificador do documento na fonte (protocolo CVM/FNET) —
            auditável em conjunto com source.
        source:
          type:
            - string
            - "null"
          description: "Conector de origem do documento (ex.: cvm_ipe, fnet_fii)."
        page_start:
          type:
            - integer
            - "null"
          minimum: 1
        download_url:
          type:
            - string
            - "null"
          format: uri
        heading_path:
          type:
            - string
            - "null"
      required:
        - ticker
        - company_name
        - doc_category
        - doc_type_raw
        - document_kind
        - reference_date
        - filed_at
        - filed_at_source
        - protocol
        - source
        - page_start
        - download_url
        - heading_path
      additionalProperties: false
    DocumentChunk:
      type: object
      properties:
        text:
          type: string
        text_expanded:
          type: string
          description: Entorno costurado (context-expansion), quando disponível.
        score:
          type: number
          minimum: -1
          maximum: 1
          description: Similaridade (1 - distância cosseno).
        ticker:
          type:
            - string
            - "null"
          deprecated: true
        company_name:
          type:
            - string
            - "null"
          deprecated: true
        doc_category:
          type:
            - string
            - "null"
          deprecated: true
        doc_type:
          type:
            - string
            - "null"
          deprecated: true
        reference_date:
          type:
            - string
            - "null"
          format: date
          deprecated: true
        page_start:
          type:
            - integer
            - "null"
          minimum: 1
          deprecated: true
        download_url:
          type:
            - string
            - "null"
          format: uri
          deprecated: true
        heading_path:
          type:
            - string
            - "null"
          deprecated: true
        citation:
          $ref: "#/components/schemas/DocumentCitation"
        is_table:
          type: boolean
      required:
        - text
        - score
        - citation
        - is_table
      additionalProperties: false
    DocumentTaxonomy:
      type: object
      properties:
        kinds:
          type: array
          items:
            type: object
            properties:
              kind:
                $ref: "#/components/schemas/DocumentKind"
              label:
                type: string
              document_count:
                type: integer
                minimum: 0
              categories:
                type: array
                items:
                  type: object
                  properties:
                    category:
                      type:
                        - string
                        - "null"
                    doc_type_raw:
                      type:
                        - string
                        - "null"
                    document_count:
                      type: integer
                      minimum: 0
                  required:
                    - category
                    - doc_type_raw
                    - document_count
                  additionalProperties: false
            required:
              - kind
              - label
              - document_count
              - categories
            additionalProperties: false
        entity_types:
          type: array
          items:
            type: string
            enum:
              - stock
              - fii
        reference_years:
          type: object
          properties:
            min:
              type:
                - integer
                - "null"
            max:
              type:
                - integer
                - "null"
          required:
            - min
            - max
          additionalProperties: false
      required:
        - kinds
        - entity_types
        - reference_years
      additionalProperties: false
    MarketEventSearchResponse:
      type: object
      properties:
        query:
          type: string
        count:
          type: integer
        events:
          type: array
          items:
            type: object
            properties:
              event_id:
                type: integer
                nullable: true
                description: Use em /v1/events/{id} e /v1/events/{id}/similar.
              dedup_key:
                type: string
              day:
                type: string
                nullable: true
              layer:
                type: string
                nullable: true
              category:
                type: string
                nullable: true
              thread_slug:
                type: string
                nullable: true
              text:
                type: string
                description: Resumo textual do evento (título + entidades + canais).
    DocumentSearchResponse:
      type: object
      properties:
        query:
          type: string
        count:
          type: integer
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/DocumentChunk"
        context:
          type: string
          description: Bloco pronto p/ prompt, com citação por trecho. Vazio quando
            include_context=false.
        warnings:
          type: array
          items:
            type: string
          description: "Avisos de semântica da busca (ex.: exclusão de documentos sem
            filed_at no modo point-in-time). Ausente quando não há avisos."
      required:
        - query
        - count
        - chunks
        - context
      additionalProperties: false
    NewsItem:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
          description: Identificador estável p/ buscar o item completo em
            /v1/news/item/{slug}.
        time:
          type: string
          description: Timestamp ISO de publicação.
        tag:
          type:
            - string
            - "null"
          description: Linha editorial.
        category:
          type:
            - string
            - "null"
        title:
          type: string
        why:
          type:
            - string
            - "null"
          description: Por que a notícia importa p/ quem investe.
        impact:
          type: array
          items:
            type: string
          description: Papéis/temas impactados.
        source:
          type:
            - string
            - "null"
        hot:
          type:
            - boolean
            - "null"
          description: Destaque do dia.
      required:
        - id
        - slug
        - time
        - title
    NewsEdition:
      type: object
      properties:
        date:
          type: string
          description: Data da edição (AAAA-MM-DD).
        slot:
          type:
            - string
            - "null"
          description: "Período: pre_abertura | intraday | fechamento."
        summary:
          type:
            - string
            - "null"
          description: Resumo do dia.
        mood:
          type:
            - string
            - "null"
          description: "Humor de mercado (ex.: otimista, cauteloso)."
        moodNote:
          type:
            - string
            - "null"
        nowTiles:
          type: array
          items:
            type: object
          description: Tiles de mercado assados na edição (índices etc.).
        agenda:
          type: array
          items:
            type: object
        watch:
          type: array
          items:
            type: object
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
      required:
        - date
        - items
    NewsEditionEnvelope:
      type: object
      properties:
        edition:
          $ref: "#/components/schemas/NewsEdition"
      required:
        - edition
    NewsDatesResponse:
      type: object
      properties:
        dates:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              slots:
                type: array
                items:
                  type: string
            required:
              - date
              - slots
      required:
        - dates
    NewsFeedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/NewsItem"
              - type: object
                properties:
                  rankContext:
                    type: object
                    properties:
                      position:
                        type: integer
                      score:
                        type: number
        nextCursor:
          type:
            - string
            - "null"
          description: Passe em ?cursor= p/ a próxima página. Ausente na última.
      required:
        - items
    NewsItemEnvelope:
      type: object
      properties:
        item:
          allOf:
            - $ref: "#/components/schemas/NewsItem"
            - type: object
              properties:
                body:
                  type:
                    - string
                    - "null"
                  description: Corpo completo do item.
                sources:
                  type: array
                  items:
                    type: object
                    properties:
                      label:
                        type: string
                      href:
                        type: string
                    required:
                      - label
                      - href
        related:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
      required:
        - item
        - related
    NewsStory:
      type: object
      description: "Uma story: um anel temático com cartões encadeados."
      properties:
        id:
          type: string
        kind:
          type:
            - string
            - "null"
        mark:
          type:
            - string
            - "null"
          description: "Selo curto (ex.: B3, M, R)."
        ring:
          type:
            - string
            - "null"
          description: "Rótulo do anel (ex.: Hoje na bolsa, Macro, Radar)."
        cards:
          type: array
          items:
            type: object
          description: Cartões da story (cover/news/stat/list…).
        generatedAt:
          type: string
          description: ISO da geração.
      required:
        - cards
    NewsStoriesResponse:
      type: object
      properties:
        stories:
          type: array
          items:
            $ref: "#/components/schemas/NewsStory"
      required:
        - stories
    NewsAgendaResponse:
      type: object
      properties:
        mercado:
          type: array
          description: Proventos com data-ex próxima.
          items:
            type: object
            properties:
              date:
                type: string
              day:
                type: string
              ticker:
                type: string
              name:
                type:
                  - string
                  - "null"
              kind:
                type: string
                description: Dividendo | JCP | Rendimento.
              unit:
                type:
                  - string
                  - "null"
              perShare:
                type:
                  - number
                  - "null"
              status:
                type:
                  - string
                  - "null"
            required:
              - date
              - ticker
              - kind
        macro:
          type: array
          items:
            type: object
            properties:
              when:
                type: string
              what:
                type: string
              why:
                type: string
              tag:
                type: string
        resultados:
          type: array
          description: Calendário forward de divulgação de resultados.
          items:
            type: object
            properties:
              date:
                type: string
              day:
                type: string
              publishDate:
                type: string
              ticker:
                type: string
              name:
                type:
                  - string
                  - "null"
              status:
                type: string
                description: previsto | confirmado.
            required:
              - ticker
              - publishDate
              - status
      required:
        - mercado
        - macro
        - resultados
tags:
  - name: Companies
    description: Companhias abertas (cadastro CVM) e demonstrações
  - name: Stocks
    description: Ações — cotações, indicadores, proventos e eventos
  - name: Quotes
    description: Cotações ao vivo (delay de 15 min) — lote e séries intradiárias
  - name: FIIs
    description: Fundos imobiliários — indicadores e distribuições
  - name: Bonds
    description: Títulos públicos (Tesouro Direto) e curvas de juros
  - name: Crypto
    description: Criptoativos — catálogo, velas diárias em BRL e cotações quase-live
  - name: EUA
    description: Ativos dos EUA (S&P 500/Nasdaq-100 + ETFs) — EOD em USD,
      fundamentos e filings SEC
  - name: Indices
    description: Índices da B3 (IBOV, IFIX, ...) e composições
  - name: Events
    description: Ledger de eventos de mercado e mundo — o que foi relevante em cada
      dia (decisões de juros, medidas provisórias, tarifas, geopolítica,
      anomalias de preço), com fontes. Não confunda com eventos SOCIETÁRIOS
      (listCorporateEvents) nem com a agenda de resultados (earnings).
  - name: Market
    description: Microestrutura de mercado — fluxo por perfil de investidor
  - name: Primary Market
    description: Mercado primário — ofertas públicas de distribuição (CVM)
  - name: BDR
    description: BDRs (recibos de ações estrangeiras) — catálogo e cotações
  - name: ETFs
    description: ETFs listados na B3 — catálogo (gestor, CNPJ, segmento)
  - name: Funds
    description: Fundos de investimento (CVM 175) — perfil, cota diária e screener
  - name: Options
    description: Opções sobre ações — cadeia vigente e histórico EOD
  - name: Macro
    description: Séries macroeconômicas, expectativas Focus e regime
  - name: Screener
    description: Filtros multi-critério sobre ações e FIIs
  - name: System
    description: Saúde e metadados da API
  - name: Carteira
    description: Carteira e perfil do usuário dono da chave de API
  - name: Documentos
    description: Busca semântica no texto de documentos CVM/B3
  - name: Notícias
    description: Edição diária, feed, stories e agenda do mercado brasileiro
  - name: Teses
    description: "Teses de investimento do dono da chave: documentos estruturados de
      research (capa, rating, cenários, fontes) salvos na conta, compartilháveis
      por link público e exportáveis em PDF."
  - name: Comunidade
    description: Leia o feed da comunidade DataBolsa e publique através de bots
      registrados. Publicações de bots exibem o selo BOT no site e passam por
      moderação automática.
paths:
  /v1/health:
    get:
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default: &a1
          description: Erro (RFC 9457 application/problem+json)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
      operationId: getHealth
      tags:
        - System
      parameters: []
      summary: Status da API e frescor dos dados
      security: []
  /v1/companies:
    get:
      responses:
        "200":
          description: Página de companhias
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Company"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listCompanies
      tags:
        - Companies
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: sector
          schema:
            type: string
            description: Setor (match exato, case-sensitive). Valor desconhecido → página
              vazia.
        - in: query
          name: segment
          schema:
            type: string
            description: "Segmento de listagem B3 (substring, case-insensitive), ex.: 'Novo
              Mercado'."
        - in: query
          name: search
          schema:
            type: string
            description: Busca por nome ou ticker da companhia.
      summary: Lista companhias abertas (cadastro CVM)
  /v1/companies/{cvm_code}:
    get:
      responses:
        "200":
          description: Companhia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        default: *a1
      operationId: getCompany
      tags:
        - Companies
      parameters:
        - in: path
          name: cvm_code
          schema:
            type: integer
            exclusiveMinimum: 0
            description: Código CVM NUMÉRICO da companhia (não o ticker). Descubra via
              /search ou listCompanies.
          required: true
      summary: Companhia por código CVM
  /v1/companies/{cvm_code}/documents:
    get:
      responses:
        "200":
          description: Página de documentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listCompanyDocuments
      tags:
        - Companies
      parameters:
        - in: path
          name: cvm_code
          schema:
            type: integer
            exclusiveMinimum: 0
            description: Código CVM NUMÉRICO da companhia (não o ticker). Descubra via
              /search ou listCompanies.
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: category
          schema:
            type: string
            description: "Categoria do documento no IPE/CVM, ex.: 'Fato Relevante',
              'Comunicado ao Mercado', 'Aviso aos Acionistas', 'Assembleia',
              'Dados Econômico-Financeiros'."
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Filtra a DATA DE REFERÊNCIA do documento (período a que ele se
              refere), não a de protocolo — um DFP do exercício 2022 é entregue
              em 2023 e aparece em from/to de 2022. A data de entrega segue no
              campo `filed_at` de cada documento.
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Fim do período (data de referência, inclusive).
      summary: Documentos e comunicados (IPE/CVM)
      description: Fatos relevantes, comunicados e documentos protocolados na CVM
        (IPE) da companhia (por código CVM). Filtre por `category` e por período
        (`from`/`to`); paginação por cursor.
  /v1/companies/{cvm_code}/statements:
    get:
      responses:
        "200":
          description: Página de demonstrações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompanyStatement"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listCompanyStatements
      tags:
        - Companies
      parameters:
        - in: path
          name: cvm_code
          schema:
            type: integer
            exclusiveMinimum: 0
            description: Código CVM NUMÉRICO da companhia (não o ticker). Descubra via
              /search ou listCompanies.
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: scope
          schema:
            type: string
            enum:
              - con
              - ind
            description: con = consolidado, ind = controladora; omitir retorna ambos.
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Início do período (ref_date, fim do trimestre contábil).
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Fim do período (ref_date, inclusive).
      summary: Demonstrações financeiras estruturadas (TTM + balanço)
      description: "Séries estruturadas por trimestre (CVM DFP/ITR): fluxos em TTM
        (receita, EBIT, EBITDA, lucro, caixa operacional/livre, capex) e balanço
        ponto-no-tempo (ativos, caixa, dívida, patrimônio). Valores em R$
        (unidade), escopo consolidado e controladora. `filed_at` traz a 1ª
        publicação na CVM para corte point-in-time sem lookahead. `from`/`to`
        filtram ref_date; paginação por cursor."
  /v1/quotes/live:
    get:
      responses:
        "200":
          description: Lote de cotações ao vivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveQuotesResponse"
        default: *a1
      operationId: getLiveQuotes
      tags:
        - Quotes
      parameters:
        - in: query
          name: tickers
          schema:
            type: string
            description: Tickers separados por vírgula (máx 200). Exclusivo com 'index'.
        - in: query
          name: index
          schema:
            type: string
            description: "Código de índice (ex.: IBOV) — resolve os constituintes. Exclusivo
              com 'tickers'."
      summary: Cotações ao vivo (delay de 15 min) em lote
      description: Último preço de vários papéis de uma vez, com delay de 15 min
        durante o pregão. Informe `tickers` (CSV, máx 200) OU `index` (código,
        resolve os constituintes). Durante o pregão o preço vem do intradiário
        (`source=intraday`); fora dele, do fechamento oficial (`source=eod`).
        Tickers desconhecidos são omitidos.
  /v1/stocks/{ticker}:
    get:
      responses:
        "200":
          description: Ação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stock"
        default: *a1
      operationId: getStock
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
      summary: Perfil e última cotação do papel
  /v1/stocks/{ticker}/quotes:
    get:
      responses:
        "200":
          description: Página de cotações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Quote"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listQuotes
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20000
            default: 100
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: adjusted
          schema:
            type: string
      summary: Série de cotações OHLCV
      description: Ajustada por eventos por default; `from`/`to` filtram o período
        (from <= to).
  /v1/stocks/{ticker}/intraday:
    get:
      responses:
        "200":
          description: Série intradiária
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntradaySeries"
        default: *a1
      operationId: getStockIntraday
      tags:
        - Quotes
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: session
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Sessão (AAAA-MM-DD); default = sessão intradiária mais recente.
      summary: Série intradiária da sessão (delay de 15 min)
      description: Barras de minuto do pregão; `session` filtra o pregão (default =
        mais recente).
  /v1/stocks/{ticker}/indicators:
    get:
      responses:
        "200":
          description: Indicadores do papel
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  reference_date:
                    type: string
                  statement_date:
                    type:
                      - string
                      - "null"
                    description: Fim do período contábil da demonstração usada (DT_REFER)
                  filed_at:
                    type:
                      - string
                      - "null"
                    description: "1ª publicação da demonstração na CVM (DT_RECEB) — é o corte que
                      `at` respeita. null: data de entrega desconhecida; o corte
                      de `at` cai no período contábil."
                  is_financial:
                    type: boolean
                  indicators:
                    type: array
                    items:
                      $ref: "#/components/schemas/IndicatorValue"
                required:
                  - ticker
                  - reference_date
                  - statement_date
                  - filed_at
                  - is_financial
                  - indicators
        default: *a1
      operationId: getStockIndicators
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: names
          schema:
            type: string
            description: "Lista separada por vírgula de indicadores a retornar (omitir =
              todos). Ex.: 'pl,roe,dy'. Nomes válidos (abreviações SEM
              underscore — use 'pl', não 'p_l'): pl, pvp, psr, ev_ebitda,
              ev_ebit, lpa, vpa, roe, roa, roic, margem_bruta, margem_ebit,
              margem_liquida, div_liq_ebitda, div_liq_pl, dy, payout,
              market_cap, price; e dinâmicos: free_float, beta, volatilidade,
              retorno_12m, volume_medio_2m."
        - in: query
          name: at
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: "Snapshot point-in-time SEM lookahead: retorna a última
              demonstração já PUBLICADA (filed_at, data de entrega à CVM) até
              esta data — não a de período contábil mais recente. O indicador
              `price` passa a refletir o fechamento do pregão mais próximo <=
              at. Demonstrações sem filed_at conhecido caem no corte por período
              contábil (ver `filed_at` na resposta)."
      summary: Indicadores fundamentalistas (snapshot TTM)
  /v1/stocks/{ticker}/indicators/history:
    get:
      responses:
        "200":
          description: Série do indicador
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  name:
                    type: string
                  label:
                    type: string
                  unit:
                    type: string
                    enum: *a2
                  reason:
                    type:
                      - string
                      - "null"
                  observations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"
                required:
                  - ticker
                  - name
                  - label
                  - unit
                  - reason
                  - observations
        default: *a1
      operationId: getStockIndicatorHistory
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: name
          schema:
            type: string
            minLength: 1
            description: "Indicador único para a série histórica (ex.: 'pl', 'roe', 'dy').
              Mesmos nomes do snapshot."
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
      summary: Histórico de um indicador (trimestral)
      description: "Série trimestral do indicador. Segue a MESMA política do snapshot
        (/stocks/{ticker}/indicators): indicadores que não se aplicam a
        instituições financeiras (margem_bruta, margem_ebit, margem_liquida,
        psr, p_ebit, p_fcf, ev_ebit, ev_ebitda, ebit_ativos, giro_ativos) vêm
        com os pontos em null e o motivo em `reason`, em vez de expor a série
        completa."
  /v1/stocks/{ticker}/dividends:
    get:
      responses:
        "200":
          description: Página de proventos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Dividend"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listDividends
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Proventos (dividendos e JCP)
  /v1/stocks/{ticker}/events:
    get:
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CorporateEvent"
        default: *a1
      operationId: listCorporateEvents
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Eventos societários (desdobramentos, grupamentos, bonificações)
  /v1/stocks/{ticker}/insider:
    get:
      responses:
        "200":
          description: Saldo mensal de insiders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InsiderMove"
                required:
                  - ticker
                  - data
        default: *a1
      operationId: listInsiderMoves
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Movimentações de insiders (CVM VLMO, por mês)
  /v1/stocks/{ticker}/fund-holders:
    get:
      responses:
        "200":
          description: Página de fundos detentores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FundHolding"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                  summary:
                    oneOf:
                      - $ref: "#/components/schemas/FundOwnershipSummary"
                      - type: "null"
                required:
                  - data
                  - meta
                  - summary
        default: *a1
      operationId: listFundHolders
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: date
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Competência do CDA (AAAA-MM-DD); default = mais recente.
      summary: Fundos de investimento que detêm o ativo (visão reversa do CDA)
      description: Quais fundos têm o ativo em carteira e quanto (R$), da competência
        mais recente do CDA (CVM). Ordenado por posição a mercado. Use `date` p/
        outra competência.
  /v1/stocks/{ticker}/trade-stats:
    get:
      responses:
        "200":
          description: Página de estatísticas de negociação
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TradeStat"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listTradeStats
      tags:
        - Stocks
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: VWAP oficial e nº de negócios por pregão (B3 consolidado)
      description: Série diária de VWAP oficial (TradAvrgPric), nº de negócios e
        volume financeiro do instrumento, do arquivo consolidado da B3.
        Complementa o OHLC ajustado de /quotes.
  /v1/screener/stocks:
    get:
      responses:
        "200":
          description: Página de resultados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScreenerRow"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: screenStocks
      tags:
        - Screener
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: pl_min
          schema:
            type: number
        - in: query
          name: pl_max
          schema:
            type: number
        - in: query
          name: pvp_min
          schema:
            type: number
        - in: query
          name: pvp_max
          schema:
            type: number
        - in: query
          name: dy_min
          schema:
            type: number
        - in: query
          name: roe_min
          schema:
            type: number
        - in: query
          name: ev_ebitda_max
          schema:
            type: number
        - in: query
          name: div_liq_ebitda_max
          schema:
            type: number
        - in: query
          name: sector
          schema:
            type: string
            description: Filtra por setor da empresa (match EXATO, case-sensitive). Valor
              desconhecido retorna página vazia, sem erro.
        - in: query
          name: segment
          schema:
            type: string
            description: "Filtra por segmento de listagem B3 (substring, case-insensitive),
              ex.: 'Novo Mercado'."
        - in: query
          name: sort
          schema:
            type: string
            description: "Ordena por indicador. Valores: pl, pvp, psr, dy, dy_12m, roe,
              roic, ev_ebitda, market_cap, margem_liquida. Prefixe com '-' para
              decrescente (ex.: -dy_12m). Nomes livres como 'dividend_yield' são
              inválidos."
      summary: Filtra ações por múltiplos critérios fundamentalistas
      description: Filtra o universo de ações por faixas de indicadores
        (pl_min/pl_max, pvp_min/pvp_max, dy_min, roe_min, ev_ebitda_max,
        div_liq_ebitda_max), setor e segmento; ordena por `sort`. Paginação por
        cursor (use meta.next_cursor). Retorna ticker, nome, setor e os
        indicadores principais por papel.
  /v1/screener/fiis:
    get:
      responses:
        "200":
          description: Página de FIIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FiiListRow"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: screenFiis
      tags:
        - Screener
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: segment
          schema:
            type: string
            description: "Filtra por segmento do FII (substring, case-insensitive), ex.:
              'Logística', 'Papel'."
        - in: query
          name: paper
          schema:
            type: string
            enum:
              - "true"
              - "false"
            description: true = papel (CRI), false = tijolo. Omitir = todos.
        - in: query
          name: min_pl
          schema:
            type: number
            description: Patrimônio líquido mínimo (R$) — corta micro-fundos ilíquidos.
        - in: query
          name: include_stale
          schema:
            type: string
            enum:
              - "true"
              - "false"
            description: "true = inclui fundos sem informe mensal recente
              (encerrados/incorporados). Default: só fundos com informe nos
              últimos 6 meses."
        - in: query
          name: sort
          schema:
            type: string
            description: "Ordena por: ticker, preco, dy, dy_12m, pvp, vacancia, pl,
              patrimonio_liquido. Prefixe com '-' para decrescente (ex.:
              -dy_12m)."
      summary: Universo de FIIs filtrável por segmento e tijolo/papel
      description: Lista o universo de FIIs ATIVOS (com informe mensal nos últimos 6
        meses; include_stale=true inclui encerrados/incorporados), filtrável por
        segmento, tijolo/papel e PL mínimo (min_pl); ordena por `sort`.
        Paginação por cursor (meta.next_cursor). Retorna ticker, nome, segmento
        e indicadores (dy, pvp, vacância…).
  /v1/screener/funds:
    get:
      responses:
        "200":
          description: Página de fundos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FundScreenerItem"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: screenFunds
      tags:
        - Screener
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: classificacao
          schema:
            type: string
            description: "Filtra por classificação CVM do fundo (match exato), ex.: 'Renda
              Fixa', 'Ações'."
        - in: query
          name: min_net_worth
          schema:
            type: number
            description: Patrimônio líquido mínimo (R$).
        - in: query
          name: sort
          schema:
            type: string
            enum:
              - net_worth
              - return_1m
              - return_12m
              - return_ytd
              - shareholders
            default: net_worth
        - in: query
          name: order
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      summary: Screener de fundos de investimento (CVM 175)
      description: Ranqueia o universo de fundos (mart_funds__screener) por
        patrimônio, retorno (1m/12m/YTD) ou nº de cotistas; filtra por
        classificação CVM e PL mínimo. `return_12m` fica null enquanto não
        houver 12m de histórico ingerido.
  /v1/macro/gears:
    get:
      responses:
        "200":
          description: Sinais por engrenagem
          content:
            application/json:
              schema:
                type: object
                properties:
                  as_of:
                    type:
                      - string
                      - "null"
                  gears:
                    type: array
                    items:
                      type: object
                      properties:
                        gear:
                          type: string
                        indicators:
                          type: array
                          items:
                            $ref: "#/components/schemas/RegimeSignal"
                      required:
                        - gear
                        - indicators
                required:
                  - as_of
                  - gears
        default: *a1
      operationId: getMacroGears
      tags:
        - Macro
      parameters:
        - in: query
          name: gear
          schema:
            type: string
            enum:
              - monetary
              - inflation
              - growth
              - employment
              - credit
              - fiscal
              - external
              - sovereign_risk
              - global
              - currency
              - cross_asset
        - in: query
          name: at
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Engrenagens macro (sinais por seção)
  /v1/macro/regime:
    get:
      responses:
        "200":
          description: Snapshot do regime
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegimeSnapshot"
        default: *a1
      operationId: getMacroRegime
      tags:
        - Macro
      parameters:
        - in: query
          name: at
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Regime econômico (quadrante crescimento × inflação)
  /v1/macro/expectations:
    get:
      responses:
        "200":
          description: Expectativas
          content:
            application/json:
              schema:
                type: object
                properties:
                  indicator:
                    type: string
                  reference:
                    type:
                      - string
                      - "null"
                  realized:
                    type:
                      - number
                      - "null"
                  surveys:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expectation"
                required:
                  - indicator
                  - reference
                  - realized
                  - surveys
        default: *a1
      operationId: getMarketExpectations
      tags:
        - Macro
      parameters:
        - in: query
          name: indicator
          schema:
            type: string
            enum:
              - ipca
              - selic
              - pib
              - cambio
          required: true
        - in: query
          name: reference
          schema:
            type: string
            description: "Ano de referência do consenso, ex.: '2026'. Omitir retorna TODAS
              as referências (mistura anos); informe um ano para uma série
              limpa."
          required: false
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
      summary: Expectativas Focus (consenso por indicador)
      description: Consenso do Boletim Focus (BCB) para ipca, selic, pib ou cambio.
        Informe `reference` (ano) para uma série limpa; sem ele, mistura todos
        os anos de referência.
  /v1/bonds/tesouro/yield-curve:
    get:
      responses:
        "200":
          description: Curva de juros
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type:
                      - string
                      - "null"
                  kind:
                    type: string
                    enum:
                      - nominal
                      - real
                  points:
                    type: array
                    items:
                      type: object
                      properties:
                        maturity:
                          type: string
                        years:
                          type:
                            - number
                            - "null"
                        rate:
                          type: number
                      required:
                        - maturity
                        - years
                        - rate
                required:
                  - date
                  - kind
                  - points
        default: *a1
      operationId: getYieldCurve
      tags:
        - Bonds
      parameters:
        - in: query
          name: date
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: "Data de referência da curva (default: mais recente)."
        - in: query
          name: kind
          schema:
            type: string
            enum:
              - nominal
              - real
            default: nominal
            description: nominal = juros prefixados (LTN/NTN-F); real = juros reais IPCA+
              (NTN-B).
      summary: Curva de juros (Tesouro), um ponto por vencimento
  /v1/bonds/tesouro:
    get:
      responses:
        "200":
          description: Página de títulos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TesouroBondQuote"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listTesouroBonds
      tags:
        - Bonds
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: type
          schema:
            type: string
            enum:
              - LTN
              - NTN-F
              - NTN-B
              - NTN-B-Principal
              - LFT
              - RENDA+
              - EDUCA+
            description: "Tipo do título: LTN (prefixado), NTN-F (prefixado c/ juros),
              NTN-B(-Principal) (IPCA+), LFT (Selic), RENDA+, EDUCA+."
        - in: query
          name: maturity
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Filtra por vencimento (YYYY-MM-DD).
        - in: query
          name: date
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: "Data de referência das taxas/preços (default: mais recente)."
      summary: Títulos do Tesouro Direto (taxas e preços)
  /v1/indices:
    get:
      responses:
        "200":
          description: Lista de índices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndexMeta"
        default: *a1
      operationId: listIndices
      tags:
        - Indices
      parameters: []
      summary: Índices disponíveis (IBOV, IFIX, ...)
      description: Catálogo dos índices da B3 cobertos (IBOV, IFIX, IBXX/IBrX-100,
        SMLL, IDIV, ICON…) com código e nome.
  /v1/indices/{code}/quotes:
    get:
      responses:
        "200":
          description: Página de níveis
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listIndexQuotes
      tags:
        - Indices
      parameters:
        - in: path
          name: code
          schema:
            type: string
            minLength: 1
            description: "Código do índice, ex.: IBOV, IFIX, IBXX, SMLL, IDIV, ICON. Ver
              listIndices."
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20000
            default: 100
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Série de níveis diários de um índice
  /v1/indices/{code}/intraday:
    get:
      responses:
        "200":
          description: Série intradiária
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntradaySeries"
        default: *a1
      operationId: getIndexIntraday
      tags:
        - Quotes
      parameters:
        - in: path
          name: code
          schema:
            type: string
            minLength: 1
            description: "Código do índice, ex.: IBOV, IFIX, IBXX, SMLL, IDIV, ICON. Ver
              listIndices."
          required: true
        - in: query
          name: session
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: Sessão (AAAA-MM-DD); default = sessão intradiária mais recente.
      summary: Série intradiária do índice (delay de 15 min)
      description: Níveis intradiários do pregão; `session` filtra o pregão (default =
        mais recente).
  /v1/indices/{code}/composition:
    get:
      responses:
        "200":
          description: Composição teórica
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexComposition"
        default: *a1
      operationId: getIndexComposition
      tags:
        - Indices
      parameters:
        - in: path
          name: code
          schema:
            type: string
            minLength: 1
            description: "Código do índice, ex.: IBOV, IFIX, IBXX, SMLL, IDIV, ICON. Ver
              listIndices."
          required: true
      summary: Composição teórica do índice (carteira teórica vigente)
  /v1/series:
    get:
      responses:
        "200":
          description: Página do catálogo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeriesMeta"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listSeries
      tags:
        - Macro
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: source
          schema:
            type: string
            enum:
              - bcb_sgs
              - bcb_focus
              - ibge_sidra
              - fred
              - ipeadata
              - tesouro_direto
              - world_bank
        - in: query
          name: search
          schema:
            type: string
      summary: Catálogo de séries (BCB/IBGE/FRED/...)
  /v1/series/{source}/{series_id}:
    get:
      responses:
        "200":
          description: Série com metadados e observações
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/SeriesMeta"
                  observations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"
                required:
                  - meta
                  - observations
        default: *a1
      operationId: getSeries
      tags:
        - Macro
      parameters:
        - in: path
          name: source
          schema:
            type: string
            minLength: 1
            description: "Fonte: bcb_sgs | bcb_focus | ibge_sidra | fred | ipeadata |
              tesouro_direto | world_bank."
          required: true
        - in: path
          name: series_id
          schema:
            type: string
            minLength: 1
            description: "ID da série na fonte. Em bcb_sgs: 432=Selic meta (%a.a.), 12=CDI
              diário, 433=IPCA mês, 13522=IPCA 12m, 1=USD/BRL, 189=IGP-M. Use
              listSeries para descobrir outras."
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: accumulated
          schema:
            type: string
            enum:
              - none
              - 12m
            default: none
            description: "Transformação: none (default) ou 12m (acumulado 12 meses, p/
              séries de variação como IPCA)."
      summary: Observações de uma série (com acumulados opcionais)
      description: "Série temporal (data, valor) de uma fonte macro (BCB SGS, IBGE
        SIDRA, FRED…). `source`+`series_id` identificam a série;
        `accumulated=12m` acumula variações. Ex.: bcb_sgs/432 = Selic meta."
  /v1/fiis/{ticker}:
    get:
      responses:
        "200":
          description: FII
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fii"
        default: *a1
      operationId: getFii
      tags:
        - FIIs
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
      summary: Perfil do fundo imobiliário
  /v1/fiis/{ticker}/indicators:
    get:
      responses:
        "200":
          description: Indicadores do FII
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  reference_date:
                    type:
                      - string
                      - "null"
                  price_basis:
                    type: string
                  indicators:
                    type: array
                    items:
                      $ref: "#/components/schemas/IndicatorValue"
                required:
                  - ticker
                  - reference_date
                  - price_basis
                  - indicators
        default: *a1
      operationId: getFiiIndicators
      tags:
        - FIIs
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
      summary: Indicadores do FII (snapshot)
      description: "Snapshot dos indicadores do FII: dividend yield (mês e 12m), P/VP,
        vacância, patrimônio líquido, valor patrimonial por cota (vp_cota) e nº
        de cotistas. Para a série temporal use o histórico.
        preco/pvp/dy_12m/ffo_yield usam o PREÇO MAIS RECENTE disponível (ver
        `price_basis` na resposta) — pode ser de um pregão posterior ao mês do
        informe em `reference_date`, então divergem do histórico, que usa o
        fechamento do FIM DO MÊS de cada data (ambos corretos; bases de preço
        diferentes)."
  /v1/fiis/{ticker}/indicators/history:
    get:
      responses:
        "200":
          description: Série do indicador
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                  name:
                    type: string
                  label:
                    type: string
                  unit:
                    type: string
                    enum: *a2
                  reason:
                    type:
                      - string
                      - "null"
                  observations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"
                required:
                  - ticker
                  - name
                  - label
                  - unit
                  - reason
                  - observations
        default: *a1
      operationId: getFiiIndicatorHistory
      tags:
        - FIIs
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: name
          schema:
            type: string
            minLength: 1
            description: "Indicador do histórico mensal do FII. Da série mensal: vp_cota,
              dividend_yield_mes, patrimonio_liquido, cotistas, dy_12m
              (distribuições ajustadas por split ÷ fechamento do fim do mês,
              mesma base de cotas). Derivado (close raw mensal): pvp."
          required: true
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: false
      summary: Histórico de um indicador do FII (informe mensal)
      description: Série mensal do informe CVM. Em `pvp` e `dy_12m`, o preço usado é o
        FECHAMENTO DO ÚLTIMO PREGÃO DE CADA MÊS (não o preço mais recente) — por
        isso podem divergir do snapshot (/fiis/{ticker}/indicators) na mesma
        reference_date; ver `price_basis` no snapshot. `dy_12m` soma as
        distribuições dos 12 meses até o fim do mês AJUSTADAS por
        desdobramentos/grupamentos, contra o fechamento na mesma base de cotas.
  /v1/fiis/{ticker}/distributions:
    get:
      responses:
        "200":
          description: Página de distribuições
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FiiDistribution"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listFiiDistributions
      tags:
        - FIIs
      parameters:
        - in: path
          name: ticker
          schema:
            type: string
            pattern: ^[A-Z][A-Z0-9]{3}[0-9]{0,2}$
          required: true
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: from
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
      summary: Distribuições (rendimentos) do FII
  /v1/fiis/{ticker}/reports:
    get:
      responses:
        "200":
          description: Página de informes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FiiMonthlyReport"
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type:
                          - string
                          - "null"
                      count:
                        type: integer
                        description: Itens nesta página
                    required:
                      - next_cursor
                      - count
                required:
                  - data
                  - meta
        default: *a1
      operationId: listFiiReports
      tags:
