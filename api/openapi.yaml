          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: to
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: layer
          schema:
            type: string
            enum:
              - estrutural
              - setorial
              - corporativa
        - in: query
          name: category
          schema:
            type: string
            enum:
              - macro
              - politica
              - internacional
              - commodities
              - corporate
              - fii
              - cripto
              - mercado
              - outros
        - in: query
          name: entity
          schema:
            type: string
            description: "Nome de ator/empresa (ex.: 'Banco Central', 'Raizen')."
        - in: query
          name: ticker
          schema:
            type: string
            description: Ticker B3 citado no evento.
        - in: query
          name: thread
          schema:
            type: string
            description: "Slug da thread (ex.: 'mp-1376')."
      summary: Eventos de mercado (ledger point-in-time)
      description: "O que foi relevante em cada dia: eventos estruturais (decisão do
        Copom, medida provisória, tarifa, geopolítica), setoriais e
        corporativos, detectados por ato oficial, cobertura de imprensa
        multi-fonte e anomalia de preço. Cada evento carrega as fontes
        (source_refs) e os canais de transmissão a preço. Histórico profundo via
        backfill de fontes oficiais. NÃO são eventos societários (para
        grupamentos/bonificações use listCorporateEvents) nem a agenda de
        resultados."
