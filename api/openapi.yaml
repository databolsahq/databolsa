        "200":
          description: Expectativas
          content:
            application/json:
              schema:
                type: object
                properties:
                  indicator:
                    type: string
                  reference:
                    type:
                      - string
                      - "null"
                  realized:
                    type:
                      - number
                      - "null"
                  surveys:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expectation"
                required:
                  - indicator
                  - reference
                  - realized
                  - surveys
        default: *a1
      operationId: getMarketExpectations
