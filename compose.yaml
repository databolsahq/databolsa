# DataBolsa (open core) — local development stack.
#
#   db         Postgres 16 + TimescaleDB + pgvector (serving DB).
#              The API reads marts loaded from data/marts. Extensions are created
#              by docker/db/init/01-extensions.sql.
#   scheduler  Daily ingest + a best-effort dbt build, then loads the marts into
#              the serving DB. The lake stays ~1.4 GB; heavy document corpora are
#              deliberately not pulled by default.
#   redis      Disposable response cache for the serving API.
#              LRU + no persistence — flush/rebuild at will; Postgres is the truth.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d db                 # serving DB (verify: bun run db:psql -> \dx)
#   docker compose run --rm scheduler databolsa-ingest run all   # one-shot ingest
#   docker compose up -d --build scheduler  # enable the daily 20:00 BRT job
name: databolsa

services:
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile   # Postgres 16 + pgvector + TimescaleDB
    image: databolsa-db:pg16
    container_name: databolsa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-databolsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-databolsa_dev}
      POSTGRES_DB: ${POSTGRES_DB:-databolsa}
    ports:
      - "${DB_PORT:-5433}:5432"   # 5433 host-side to avoid clashing with other local Postgres
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-databolsa} -d ${POSTGRES_DB:-databolsa}"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: databolsa-scheduler
    restart: unless-stopped
    init: true
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABOLSA_DATA_ROOT: /app/data
      FRED_API_KEY: ${FRED_API_KEY:-}     # optional; the FRED connector self-skips if empty
      DATABASE_URL: postgresql://${POSTGRES_USER:-databolsa}:${POSTGRES_PASSWORD:-databolsa_dev}@db:5432/${POSTGRES_DB:-databolsa}
      REDIS_URL: redis://redis:6379
      TZ: America/Sao_Paulo
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    container_name: databolsa-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6380}:6379"   # 6380 host-side to avoid clashing with other local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
