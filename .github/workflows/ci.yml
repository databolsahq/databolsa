name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  # Empacota sdk/cli/mcp (tarball == npm), instala num ambiente isolado e valida que
  # importam/rodam (SDK, CLI --version, handshake MCP) sem tocar rede. Independente da
  # disponibilidade da API — o CI nunca quebra por causa do data-plane.
  packages-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: bun install --frozen-lockfile
      - run: node scripts/smoke-packages.mjs --offline
